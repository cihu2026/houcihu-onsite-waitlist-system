<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後慈湖［現場］補位系統</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    background:linear-gradient(135deg,#0b3d2e,#1e6a47);
}

.hero{
    background:#fff;
    border-radius:26px;
    padding:28px;
    box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.hero h1{
    font-size:34px;
    color:#14532d;
    margin-bottom:10px;
}

.hero p{
    color:#666;
    line-height:1.8;
    margin-bottom:18px;
}

.tip{
    background:#fff8e6;
    border:1px solid #ffe08a;
    color:#8a6200;
    padding:14px;
    border-radius:16px;
    margin-bottom:18px;
    line-height:1.7;
}

.info{
    background:#eef8f1;
    border:1px solid #d7efdf;
    color:#14532d;
    padding:14px;
    border-radius:16px;
    margin-bottom:18px;
    line-height:1.7;
}

.slot-card{
    background:#fff;
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
}

.slot-time{
    font-size:24px;
    font-weight:800;
    color:#14532d;
}

.slot-status{
    font-size:16px;
    font-weight:800;
}

.footer-note{
    text-align:center;
    color:#eee;
    margin-top:20px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">

<div class="badge">現場候補入口</div>

<h1>後慈湖［現場］補位系統</h1>

<p>
官方網路預約額滿時，可於現場登記候補。<br>
系統將依登記順序遞補並即時叫號。
</p>

<div class="tip" id="tipBox">
請先查看梯次資訊，再進行候補登記。
</div>

<div class="info" id="queryInfo">
讀取網址參數中...
</div>

<!-- 官方梯次 -->
<div id="slotArea">
讀取官方梯次資訊中...
</div>

<!-- 報名表單 -->
<form id="queueForm">

<input
type="text"
id="name"
placeholder="請輸入姓名"
required>

<input
type="tel"
id="phone"
placeholder="請輸入手機號碼"
required>

<select id="people">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
</select>

<select id="slot">
<option value="09:30">09:30 梯次</option>
<option value="10:00">10:00 梯次</option>
<option value="10:30">10:30 梯次</option>
<option value="11:00">11:00 梯次</option>
</select>

<button type="submit">
立即候補登記
</button>

</form>

</div>

<div class="footer-note">
Houcihu Onsite Waitlist System
</div>

</div>

<script src="script.js"></script>

<script>
// ==================================
// 讀網址參數
// ==================================
const params =
new URLSearchParams(window.location.search);

const slot =
params.get("slot");

const status =
params.get("status");

const remain =
params.get("remain");

// ==================================
// 顯示網址資訊
// ==================================
function showQueryInfo(){

    const box =
    document.getElementById("queryInfo");

    const tip =
    document.getElementById("tipBox");

    let html = "";

    if(slot){

        html += "指定梯次：" + slot + "<br>";

        const select =
        document.getElementById("slot");

        if(select){
            select.value = slot;
        }
    }

    if(status){

        html += "狀態：" + status + "<br>";

        if(status === "full"){

            tip.innerHTML =
            "📢 " + slot +
            " 梯次已額滿，可登記現場候補。";
        }
    }

    if(remain){

        html += "剩餘名額：" + remain + "<br>";

        tip.innerHTML =
        "📢 " + slot +
        " 梯次官方剩餘 " +
        remain +
        " 名。";
    }

    if(html === ""){
        html = "目前未指定梯次參數";
    }

    box.innerHTML = html;
}

// ==================================
// 官方梯次資料（假資料版）
// 若 script.js 有抓官方資料會覆蓋
// ==================================
function fallbackSlots(){

    const area =
    document.getElementById("slotArea");

    if(area.innerHTML.includes("slot-card")) return;

    area.innerHTML = `
    <div class="slot-card">
        <div class="slot-time">09:30</div>
        <div class="slot-status" style="color:#fd7e14">
        尚餘 3 名
        </div>
    </div>

    <div class="slot-card">
        <div class="slot-time">10:00</div>
        <div class="slot-status" style="color:#dc3545">
        額滿
        </div>
    </div>

    <div class="slot-card">
        <div class="slot-time">10:30</div>
        <div class="slot-status" style="color:#198754">
        可報名
        </div>
    </div>
    `;
}

// 啟動
showQueryInfo();

// 2秒後若官方沒抓到資料則顯示備援
setTimeout(fallbackSlots,2000);

</script>

</body>
</html>
