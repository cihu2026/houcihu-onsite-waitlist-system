<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>後慈湖現場補位系統</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
    background:linear-gradient(135deg,#0f5132,#198754);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:520px;
    background:#fff;
    border-radius:22px;
    padding:32px;
    box-shadow:0 18px 45px rgba(0,0,0,.18);
}

.badge{
    display:inline-block;
    background:#e9f8ef;
    color:#198754;
    padding:6px 14px;
    border-radius:50px;
    font-size:14px;
    font-weight:700;
    margin-bottom:14px;
}

h1{
    font-size:32px;
    color:#16351f;
    margin-bottom:8px;
}

.sub{
    color:#666;
    line-height:1.7;
    margin-bottom:24px;
}

.notice{
    background:#fff8e6;
    color:#8a6200;
    border:1px solid #ffe08a;
    padding:14px;
    border-radius:14px;
    margin-bottom:24px;
    line-height:1.6;
    font-size:15px;
}

form{
    display:flex;
    flex-direction:column;
    gap:16px;
}

label{
    font-size:15px;
    font-weight:700;
    color:#333;
    margin-bottom:6px;
    display:block;
}

input,select{
    width:100%;
    padding:14px;
    border:1px solid #d8d8d8;
    border-radius:12px;
    font-size:16px;
}

input:focus,select:focus{
    outline:none;
    border-color:#198754;
}

button{
    margin-top:8px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#198754;
    color:#fff;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#157347;
}

.footer{
    margin-top:22px;
    text-align:center;
    color:#777;
    font-size:14px;
    line-height:1.7;
}

.status{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:#f8f9fa;
    padding:16px;
    border-radius:14px;
    text-align:center;
}

.card .num{
    font-size:28px;
    font-weight:800;
    color:#198754;
}

.card .txt{
    color:#666;
    font-size:14px;
}

@media(max-width:600px){
    .container{
        padding:24px;
    }
    h1{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="badge">現場候補入口</div>

<h1>後慈湖［現場］補位系統</h1>

<p class="sub">
熱門梯次額滿時，可於現場登記候補。<br>
系統將依登記順序遞補，並即時叫號。
</p>

<div class="notice">
📢 請於現場等候叫號，過號將視情況重新安排。
</div>

<form>

<div>
<label>姓名</label>
<input type="text" placeholder="請輸入姓名">
</div>

<div>
<label>手機號碼</label>
<input type="tel" placeholder="請輸入手機號碼">
</div>

<div>
<label>人數</label>
<select>
<option>1 人</option>
<option>2 人</option>
<option>3 人</option>
<option>4 人</option>
</select>
</div>

<div>
<label>候補梯次</label>
<select>
<option>09:30</option>
<option>10:00</option>
<option>10:30</option>
<option>11:00</option>
</select>
</div>

<button type="submit">立即候補登記</button>

</form>

<div class="status">
<div class="card">
<div class="num">08</div>
<div class="txt">目前候補組數</div>
</div>

<div class="card">
<div class="num">2</div>
<div class="txt">本梯次剩餘名額</div>
</div>
</div>

<div class="footer">
後慈湖現場補位系統<br>
請依現場人員指示辦理
</div>

</div>

</body>
</html>
