<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜即時梯次資訊</title>
<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,#eef6ef,#dfeee2);
color:#1f2d1f;
}

header{
background:linear-gradient(135deg,#1f5f35,#3e8b55);
color:#fff;
text-align:center;
padding:28px 18px;
}

header h1{
margin:0;
font-size:32px;
}

header p{
margin:10px 0 0;
opacity:.95;
}

.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:22px;
padding:24px;
margin-bottom:18px;
box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.big{
font-size:44px;
font-weight:900;
text-align:center;
color:#1f7a3f;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

.slot{
border:1px solid #e8ece8;
border-radius:18px;
padding:18px;
text-align:center;
}

.slot h3{
margin:0 0 10px;
font-size:24px;
}

.state{
font-size:28px;
font-weight:900;
}

.green{color:#1f7a3f;}
.red{color:#d33;}
.orange{color:#d98b00;}
.gray{color:#888;}

.note{
line-height:1.8;
color:#444;
}

.btns{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

button{
width:100%;
border:none;
border-radius:14px;
padding:15px;
background:#1f7a3f;
color:#fff;
font-size:18px;
font-weight:800;
cursor:pointer;
}

.graybtn{
background:#666;
}

footer{
text-align:center;
color:#666;
padding:10px 0 30px;
}

@media(max-width:768px){

.big{font-size:34px;}

.btns{
grid-template-columns:1fr;
}

.state{
font-size:22px;
}

button{
font-size:17px;
}

}
</style>
</head>

<body>

<header>
<h1>後慈湖 即時梯次資訊</h1>
<p>預約旅客｜現場候補｜即時更新</p>
</header>

<div class="wrap">

<!-- 今日狀態 -->
<div class="card">
<div class="big" id="todayText">
讀取中...
</div>
</div>

<!-- 梯次資訊 -->
<div class="card">

<h2>今日梯次狀況</h2>

<div class="grid" id="slotGrid">
</div>

</div>

<!-- 候補資訊 -->
<div class="card">

<h2>現場候補資訊</h2>

<div class="note">
目前叫號：
<b id="currentNo">A000</b><br>

現場遞補不代表一定有名額。<br>
請留意現場叫號與工作人員引導。
</div>

</div>

<!-- 快速入口 -->
<div class="card">

<h2>快速服務</h2>

<div class="btns">

<button onclick="location.href='checkin.html'">
現場候補登記
</button>

<button class="graybtn"
onclick="location.href='screen.html'">
查看叫號看板
</button>

</div>

</div>

</div>

<footer>
Houcihu Visitor Service Center
</footer>

<script src="sheets.js?v=3"></script>

<script>
// =======================
// 今日文字
// =======================
function setTodayText(){

const now = new Date();
const limit = new Date("2026-06-21");

if(now < limit){

document.getElementById("todayText")
.innerText =
"今日開放第 1、3、5、7 梯";

}else{

document.getElementById("todayText")
.innerText =
"今日開放第 1 至 8 梯";

}

}

// =======================
// 梯次資訊
// =======================
async function renderSessions(){

const rows =
await getSessions();

const box =
document.getElementById("slotGrid");

box.innerHTML="";

for(let i=1;i<rows.length;i++){

const no = rows[i][0];
const open = rows[i][1];
const cap = Number(rows[i][2]);

let text="";
let cls="gray";

if(!open){

text="未開放";
cls="gray";

}else if(cap<=0){

text="額滿";
cls="red";

}else if(cap<=3){

text="尚餘 "+cap+" 位";
cls="orange";

}else{

text="可遞補";
cls="green";

}

box.innerHTML += `
<div class="slot">

<h3>第 ${no} 梯</h3>

<div class="state ${cls}">
${text}
</div>

</div>
`;

}

}

// =======================
// 目前叫號
// =======================
async function loadCurrent(){

const rows =
await cloudGet();

let current = "A000";

if(rows && rows.length>1){

for(let i=1;i<rows.length;i++){

if(rows[i][5]==="called"){
current = rows[i][0];
}

}

}

document.getElementById("currentNo")
.innerText = current;

}

// =======================
// 啟動
// =======================
async function init(){

setTodayText();

await renderSessions();

await loadCurrent();

setInterval(async()=>{

await renderSessions();
await loadCurrent();

},5000);

}

init();

</script>

</body>
</html>
