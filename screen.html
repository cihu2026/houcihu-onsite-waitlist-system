<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後慈湖現場補位系統｜叫號畫面</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
    background:linear-gradient(135deg,#0b3d2e,#146c43);
    min-height:100vh;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    text-align:center;
}

.badge{
    display:inline-block;
    background:rgba(255,255,255,.15);
    padding:10px 18px;
    border-radius:50px;
    font-size:18px;
    margin-bottom:24px;
}

h1{
    font-size:52px;
    margin-bottom:14px;
    letter-spacing:2px;
}

.sub{
    font-size:22px;
    opacity:.9;
    margin-bottom:40px;
}

.main-box{
    background:#fff;
    color:#14532d;
    border-radius:28px;
    padding:42px 20px;
    box-shadow:0 20px 45px rgba(0,0,0,.18);
    margin-bottom:28px;
}

.label{
    font-size:26px;
    margin-bottom:18px;
}

.number{
    font-size:130px;
    font-weight:900;
    line-height:1;
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-top:18px;
}

.card{
    background:rgba(255,255,255,.12);
    border-radius:22px;
    padding:24px;
}

.card-title{
    font-size:18px;
    margin-bottom:10px;
    opacity:.9;
}

.card-value{
    font-size:42px;
    font-weight:800;
}

.notice{
    margin-top:30px;
    font-size:22px;
    line-height:1.8;
    opacity:.95;
}

.footer{
    margin-top:24px;
    font-size:16px;
    opacity:.75;
}

.blink{
    animation:blink 1.2s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:.35;}
    100%{opacity:1;}
}

@media(max-width:768px){

    h1{
        font-size:34px;
    }

    .sub{
        font-size:18px;
    }

    .number{
        font-size:82px;
    }

    .label{
        font-size:22px;
    }

    .card-value{
        font-size:34px;
    }

    .notice{
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="badge">現場補位叫號畫面</div>

<h1>後慈湖［現場］補位系統</h1>

<p class="sub">
請留意目前叫號資訊，依序至服務台辦理
</p>

<div class="main-box">

<div class="label">目前叫號</div>

<div class="number blink" id="calledNumber">
A001
</div>

</div>

<div class="info-grid">

<div class="card">
<div class="card-title">下一位</div>
<div class="card-value" id="nextNumber">A002</div>
</div>

<div class="card">
<div class="card-title">等待組數</div>
<div class="card-value" id="waitingCount">08</div>
</div>

<div class="card">
<div class="card-title">剩餘名額</div>
<div class="card-value" id="remainSeat">02</div>
</div>

</div>

<div class="notice">
📢 請聽從現場工作人員指示<br>
過號將依現場規則重新安排
</div>

<div class="footer">
Houcihu Onsite Waitlist System
</div>

</div>

<script src="script.js"></script>

</body>
</html>
