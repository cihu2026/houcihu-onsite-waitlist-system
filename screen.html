<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖叫號看板</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="screen">

<header class="topbar">
<h1>後慈湖現場候補</h1>
</header>

<div class="now-box">
<div class="label">目前叫號</div>
<div class="big-no" id="currentNo">A000</div>
</div>

<div class="next-box">
<div class="label">下一組</div>
<div class="mid-no" id="nextNo">---</div>
</div>

<div class="queue-box">
<div class="label">等待組數</div>
<div class="count" id="waitingCount">0</div>
</div>

<div class="miss-box">
<div class="label">過號名單</div>
<div id="missedList">無</div>
</div>

<script src="script.js"></script>
<script src="sheets.js"></script>
</body>
</html>
