<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後慈湖現場補位系統｜電視叫號畫面</title>

<link rel="stylesheet" href="style.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
    background:linear-gradient(135deg,#083b2d,#166944);
    min-height:100vh;
    color:#fff;
    overflow:hidden;
}

.wrap{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.top-badge{
    background:rgba(255,255,255,.14);
    padding:12px 24px;
    border-radius:50px;
    font-size:22px;
    font-weight:700;
    margin-bottom:28px;
}

.title{
    font-size:64px;
    font-weight:900;
    letter-spacing:2px;
    margin-bottom:18px;
    text-align:center;
}

.sub{
    font-size:28px;
    opacity:.92;
    margin-bottom:34px;
    text-align:center;
}

.main-card{
    width:100%;
    max-width:1050px;
    background:#fff;
    color:#14532d;
    border-radius:34px;
    padding:48px 30px;
    box-shadow:0 28px 60px rgba(0,0,0,.18);
    text-align:center;
}

.main-label{
    font-size:34px;
    margin-bottom:18px;
    font-weight:700;
}

.main-number{
    font-size:180px;
    font-weight:900;
    line-height:1;
    letter-spacing:4px;
}

.blink{
    animation:blink 1.2s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:.35;}
    100%{opacity:1;}
}

.grid{
    width:100%;
    max-width:1050px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-top:26px;
}

.info-card{
    background:rgba(255,255,255,.12);
    border-radius:26px;
    padding:28px;
    text-align:center;
}

.info-title{
    font-size:24px;
    margin-bottom:12px;
    opacity:.95;
}

.info-value{
    font-size:58px;
    font-weight:900;
}

.notice{
    margin-top:30px;
    font-size:30px;
    line-height:1.8;
    text-align:center;
    opacity:.96;
}

.footer{
    position:fixed;
    bottom:14px;
    font-size:16px;
    opacity:.7;
}

@media(max-width:1200px){

    .title{
        font-size:48px;
    }

    .main-number{
        font-size:120px;
    }

    .info-value{
        font-size:40px;
    }

    .notice{
        font-size:22px;
    }
}

@media(max-width:768px){

    .grid{
        grid-template-columns:1fr;
    }

    .title{
        font-size:34px;
    }

    .sub{
        font-size:20px;
    }

    .main-number{
        font-size:84px;
    }

    .main-label{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="wrap">

<div class="top-badge">
現場補位叫號系統
</div>

<div class="title">
後慈湖［現場］補位系統
</div>

<div class="sub">
請依序至服務台辦理候補遞補
</div>

<!-- 主叫號 -->
<div class="main-card">

<div class="main-label">
目前叫號
</div>

<div class="main-number blink" id="calledNumber">
A001
</div>

</div>

<!-- 下方資訊 -->
<div class="grid">

<div class="info-card">
<div class="info-title">下一位</div>
<div class="info-value" id="nextNumber">
A002
</div>
</div>

<div class="info-card">
<div class="info-title">等待組數</div>
<div class="info-value" id="waitingCount">
08
</div>
</div>

<div class="info-card">
<div class="info-title">今日總登記</div>
<div class="info-value" id="totalCount">
12
</div>
</div>

</div>

<div class="notice">
📢 請留意現場廣播與叫號資訊<br>
過號將依現場規則重新安排
</div>

<div class="footer">
Houcihu Onsite Waitlist System Display
</div>

</div>

<script src="script.js"></script>

<script>
// -----------------------------------
// 更新總數
// -----------------------------------
function renderTotal(){

    const list =
    JSON.parse(
        localStorage.getItem(
            "houcihu_waitlist_data"
        )
    ) || [];

    const box =
    document.getElementById("totalCount");

    if(box){
        box.innerText = list.length;
    }
}

// -----------------------------------
// 自動刷新
// -----------------------------------
function autoRefresh(){

    if(typeof renderScreen === "function"){
        renderScreen();
    }

    renderTotal();
}

// 每3秒更新
setInterval(autoRefresh,3000);

// 首次載入
setTimeout(autoRefresh,300);

</script>

</body>
</html>
