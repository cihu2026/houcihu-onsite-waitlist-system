<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜即時叫號看板</title>
<link rel="stylesheet" href="style.css">

<style>
body{
text-align:center;
background:#0f4726;
color:#fff;
}

.board{
max-width:1100px;
margin:auto;
padding:30px 20px;
}

.now{
font-size:140px;
font-weight:900;
line-height:1;
margin:20px 0;
}

.sub{
font-size:34px;
opacity:.95;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
margin-top:24px;
}

.box{
background:rgba(255,255,255,.12);
border-radius:20px;
padding:20px;
}

.box h3{
margin:0 0 10px;
font-size:24px;
}

.value{
font-size:46px;
font-weight:900;
}

.notice{
margin-top:28px;
font-size:24px;
opacity:.92;
}

@media(max-width:768px){

.now{
font-size:90px;
}

.sub{
font-size:24px;
}

.value{
font-size:34px;
}

.notice{
font-size:18px;
}

}
</style>
</head>

<body>

<div class="board">

<h1>後慈湖 現場候補叫號系統</h1>

<div class="sub">目前叫號</div>
<div class="now" id="nowNo">A000</div>

<div class="grid">

<div class="box">
<h3>下一位</h3>
<div class="value" id="nextNo">--</div>
</div>

<div class="box">
<h3>等待組數</h3>
<div class="value" id="waitCount">0</div>
</div>

<div class="box">
<h3>預估等待</h3>
<div class="value" id="waitMin">0 分</div>
</div>

</div>

<div class="notice">
請留意現場叫號，過號請洽服務人員
</div>

</div>

<script src="sheets.js"></script>

<script>
function renderBoard(data){

if(!data) return;

document.getElementById("nowNo").innerText =
data.current || "A000";

const queue =
data.queue || [];

const waiting =
queue.filter(v=>v.status==="waiting");

document.getElementById("waitCount").innerText =
waiting.length;

document.getElementById("nextNo").innerText =
waiting[0] ? waiting[0].number : "--";

document.getElementById("waitMin").innerText =
(waiting.length * 3) + " 分";
}

initCloud().then(renderBoard);
autoSync(renderBoard,3000);
</script>

</body>
</html>
