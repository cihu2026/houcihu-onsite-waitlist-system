<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜即時叫號看板</title>

<style>
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--orange:#d98b00;
--red:#d33;
--bg1:#eef6ef;
--bg2:#dfeee2;
--card:#ffffff;
--text:#1f2d1f;
--muted:#666;
--line:#e9ece9;
--shadow:0 12px 28px rgba(0,0,0,.08);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
overflow-x:hidden;
}

header{
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
text-align:center;
padding:20px 12px;
}

header h1{
margin:0;
font-size:24px;
font-weight:900;
line-height:1.2;
}

header p{
margin:8px 0 0;
font-size:14px;
opacity:.95;
}

.wrap{
padding:12px;
max-width:1000px;
margin:auto;
}

.card{
background:#fff;
border-radius:20px;
padding:16px;
margin-bottom:12px;
box-shadow:var(--shadow);
}

.big{
font-size:60px;
font-weight:900;
text-align:center;
color:var(--green);
line-height:1;
word-break:break-all;
}

.sub{
text-align:center;
font-size:16px;
margin-top:8px;
color:var(--muted);
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

.slot{
background:#f7faf7;
border:1px solid var(--line);
border-radius:16px;
padding:16px;
text-align:center;
}

.slot h3{
margin:0 0 8px;
font-size:22px;
font-weight:900;
}

.state{
font-size:24px;
font-weight:900;
}

.green{color:var(--green);}
.orange{color:var(--orange);}
.red{color:var(--red);}
.gray{color:#888;}

.footer{
text-align:center;
font-size:14px;
padding:10px 14px 22px;
color:#666;
line-height:1.7;
}

@media(min-width:768px){
.big{font-size:110px;}
.grid{grid-template-columns:repeat(2,1fr);}
header h1{font-size:34px;}
}

@media(min-width:1200px){
.grid{grid-template-columns:repeat(4,1fr);}
.big{font-size:150px;}
}
</style>
</head>

<body>

<header>
    <h1>後慈湖 即時叫號看板</h1>
    <p>請留意現場叫號與梯次資訊</p>
</header>

<div class="wrap">
    <div class="card">
        <div class="big" id="currentNo">A000</div>
        <div class="sub">目前叫號</div>NOW CALLING</div>
    </div>

    <div class="card">
        <div class="grid" id="slotGrid">
            <div style="text-align:center; width:100%; grid-column: 1/-1;">系統連線中...</div>
        </div>
    </div>
</div>

<div class="footer">
    現場遞補不代表一定有名額，請依工作人員引導辦理
</div>

<script src="sheets.js?v=10.1"></script>

<script>
// 使用優化後的同步邏輯
async function refreshDisplay() {
    try {
        // 同時抓取名單與梯次，加速反應
        const [rows, sessions] = await Promise.all([
            cloudGet(),
            getSessions()
        ]);

        // 1. 更新目前叫號
        let current = "A000";
        if (rows && rows.length > 1) {
            // 從後往前找，最後一個被叫號的人
            for (let i = rows.length - 1; i >= 1; i--) {
                if (rows[i][5] === "called") {
                    current = rows[i][0];
                    break;
                }
            }
        }
        document.getElementById("currentNo").innerText = current;

        // 2. 更新梯次資訊
        const box = document.getElementById("slotGrid");
        if (!sessions || sessions.length <= 1) return;

        let html = "";
        for (let i = 1; i < sessions.length; i++) {
            const [no, open, cap] = sessions[i];
            let text = "", cls = "gray";

            if (!open) {
                text = "未開放";
            } else if (Number(cap) <= 0) {
                text = "額滿候補";
                cls = "red";
            } else if (Number(cap) <= 3) {
                text = `剩 ${cap} 位`;
                cls = "orange";
            } else {
                text = "可登記";
                cls = "green";
            }

            html += `
                <div class="slot">
                    <h3>第 ${no} 梯</h3>
                    <div class="state ${cls}">${text}</div>
                </div>
            `;
        }
        box.innerHTML = html;

    } catch (e) {
        console.error("看板更新錯誤:", e);
    }
}

// 初始化
async function init() {
    await refreshDisplay();
    
    // 使用 sheets.js v10.1 的 autoSync 機制，預設 5 秒更新一次
    if (typeof autoSync === "function") {
        autoSync(refreshDisplay, 5000);
    }
}

init();
</script>

</body>
</html>
