<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Abby Luo">
<meta name="generator" content="Houcihu Waitlist Checkin v10">
<title>後慈湖｜現場候補登記</title>
<link rel="stylesheet" href="style.css">

<style>
.wrap{
max-width:760px;
}

.slotinfo{
margin-top:12px;
font-weight:900;
text-align:center;
line-height:1.6;
}

.option{
margin-top:16px;
padding:16px;
background:#f7faf7;
border-radius:18px;
}

.option label{
display:flex;
gap:10px;
align-items:flex-start;
font-weight:700;
margin:10px 0;
}

.option input{
width:auto;
margin-top:4px;
}

.red{color:#d33;}
.orange{color:#d98b00;}
.green{color:#1f7a3f;}
</style>
</head>

<body>

<header class="hero">
<h1>現場候補登記</h1>
<p>請填寫資料後送出</p>
</header>

<div class="wrap">

<!-- 公告 -->
<div class="card notice">
現場遞補不代表一定有名額。<br>
實際入場資格依現場名額與工作人員安排為準。
</div>

<!-- 表單 -->
<div class="card">

<form id="waitForm">

<label>姓名</label>
<input type="text" id="name" required>

<label>手機號碼</label>
<input type="tel" id="phone" inputmode="numeric" required>

<label>人數</label>
<select id="people">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
<option value="5">5 人</option>
<option value="6">6 人</option>
<option value="7">7 人</option>
<option value="8">8 人</option>
<option value="9">9 人</option>
<option value="10">10 人</option>
</select>

<label>選擇梯次</label>
<select id="slot"></select>

<div class="slotinfo" id="slotInfo">
讀取梯次資訊中...
</div>

<div class="option">

<div style="font-weight:900;">
候補安排意願
</div>

<label>
<input type="radio"
name="flex"
value="接受其他梯次"
checked>
<span>
若原梯次額滿，可接受安排其他相近梯次遞補
</span>
</label>

<label>
<input type="radio"
name="flex"
value="僅原梯次">
<span>
僅接受原選梯次候補
</span>
</label>

</div>

<button type="submit">
送出登記
</button>

</form>

</div>

<!-- 成功 -->
<div class="card"
id="successBox"
style="display:none;">

<h2 style="text-align:center;">
登記成功
</h2>

<div class="big" id="ticketNo">
A001
</div>

<p class="text" style="text-align:center;">
請留意現場叫號與廣播通知。
</p>

<a class="btn gray"
href="visitor.html">
返回首頁
</a>

</div>

</div>

<footer>
Houcihu Visitor Service Center
</footer>

<script src="sheets.js?v=10"></script>

<script>
async function loadSlots(){

const rows = await getSessions();

const slot =
document.getElementById(
"slot"
);

slot.innerHTML="";

for(let i=1;i<rows.length;i++){

const no   = rows[i][0];
const open = rows[i][1];
const cap  = Number(rows[i][2]);

if(!open) continue;

let text="";

if(cap<=0){

text="第"+no+"梯（額滿候補）";

}else{

text="第"+no+"梯（剩 "+cap+" 位）";

}

slot.innerHTML += `
<option value="第${no}梯">
${text}
</option>
`;

}

showSlotInfo();

}

async function showSlotInfo(){

const rows = await getSessions();

const val =
document.getElementById(
"slot"
).value;

const no =
val.replace("第","")
.replace("梯","");

const info =
document.getElementById(
"slotInfo"
);

for(let i=1;i<rows.length;i++){

if(String(rows[i][0])===no){

const cap =
Number(rows[i][2]);

if(cap<=0){

info.className=
"slotinfo red";

info.innerText=
"目前額滿，可登記候補等待遞補";

}else if(cap<=3){

info.className=
"slotinfo orange";

info.innerText=
"剩餘名額較少，請儘速登記";

}else{

info.className=
"slotinfo green";

info.innerText=
"目前可候補登記";

}

}

}

}

document.getElementById(
"slot"
).addEventListener(
"change",
showSlotInfo
);

document.getElementById(
"waitForm"
).addEventListener(
"submit",
async function(e){

e.preventDefault();

const name =
document.getElementById(
"name"
).value.trim();

const phone =
document.getElementById(
"phone"
).value.trim();

if(!/^09\d{8}$/.test(phone)){

alert("請輸入正確手機號碼");
return;

}

const people =
document.getElementById(
"people"
).value;

const slot =
document.getElementById(
"slot"
).value;

const flex =
document.querySelector(
'input[name="flex"]:checked'
).value;

const rows =
await cloudGet();

const no =
"A"+
String(rows.length)
.padStart(3,"0");

const result =
await addQueue(
no,
name,
phone,
people,
slot+"｜"+flex
);

if(result){

document.getElementById(
"waitForm"
).style.display="none";

document.getElementById(
"successBox"
).style.display="block";

document.getElementById(
"ticketNo"
).innerText=no;

}else{

alert("送出失敗");

}

}
);

loadSlots();
</script>

</body>
</html>
