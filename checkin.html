<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜現場候補登記</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
  background:linear-gradient(135deg,#eef6ef,#dfeee2);
  color:#1f2d1f;
}

header{
  background:linear-gradient(135deg,#1f5f35,#3e8b55);
  color:#fff;
  text-align:center;
  padding:28px 18px;
}

header h1{
  margin:0;
  font-size:32px;
}

header p{
  margin:10px 0 0;
  font-size:16px;
  opacity:.95;
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.notice{
  background:#f7fbf7;
  border-left:5px solid #1f7a3f;
}

.notice ul{
  margin:10px 0 0 18px;
  padding:0;
  line-height:1.8;
}

label{
  display:block;
  margin:0 0 8px;
  font-weight:700;
  font-size:17px;
}

input,select,textarea{
  width:100%;
  padding:14px;
  border:1px solid #d7dfd7;
  border-radius:14px;
  font-size:17px;
  box-sizing:border-box;
  margin-bottom:16px;
}

input:focus,
select:focus,
textarea:focus{
  outline:none;
  border-color:#1f7a3f;
  box-shadow:0 0 0 3px rgba(31,122,63,.12);
}

button{
  width:100%;
  border:none;
  border-radius:16px;
  padding:16px;
  background:#1f7a3f;
  color:#fff;
  font-size:22px;
  font-weight:800;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
}

.small{
  font-size:14px;
  color:#666;
}

.success{
  display:none;
  text-align:center;
}

.success .no{
  font-size:72px;
  font-weight:900;
  color:#1f7a3f;
  margin:10px 0;
}

.footer{
  text-align:center;
  color:#666;
  font-size:14px;
  padding:10px 0 30px;
}

.loading{
  display:none;
  text-align:center;
  color:#1f7a3f;
  font-weight:700;
}

@media(max-width:768px){

  header h1{
    font-size:26px;
  }

  .card{
    padding:18px;
  }

  .success .no{
    font-size:56px;
  }

  button{
    font-size:20px;
  }
}
</style>
</head>

<body>

<header>
<h1>後慈湖 現場候補登記</h1>
<p>請自行填寫資料，完成後留意現場叫號</p>
</header>

<div class="wrap">

<!-- 說明 -->
<div class="card notice">
<h2>登記須知</h2>
<ul>
<li>依現場候補順序遞補。</li>
<li>本登記不保證可入場。</li>
<li>請留意現場叫號與廣播。</li>
<li>過號將依現場規定辦理。</li>
</ul>
</div>

<!-- 表單 -->
<div class="card" id="formCard">

<h2>填寫資料</h2>

<form id="waitForm">

<label>姓名</label>
<input type="text" id="name" placeholder="請輸入姓名" required>

<label>手機號碼</label>
<input type="tel" id="phone" placeholder="請輸入手機號碼" required>

<label>人數</label>
<select id="count">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
<option value="5">5 人</option>
</select>

<label>候補梯次（選填）</label>
<select id="session">
<option value="">現場安排</option>
<option value="1">第1梯</option>
<option value="3">第3梯</option>
<option value="5">第5梯</option>
<option value="7">第7梯</option>
</select>

<label>備註（選填）</label>
<textarea id="note" rows="3" placeholder="例如：長者同行、幼童推車"></textarea>

<div class="small">
送出後將取得候補號碼。
</div>
<br>

<button type="submit" id="submitBtn">
立即候補登記
</button>

</form>

<div class="loading" id="loading">
送出中，請稍候...
</div>

</div>

<!-- 成功頁 -->
<div class="card success" id="successCard">

<h2>候補登記成功</h2>

<div>您的號碼</div>
<div class="no" id="ticketNo">A001</div>

<p>
請留意現場叫號，依工作人員引導辦理。<br>
是否遞補成功，依現場名額為準。
</p>

<button onclick="location.reload()">
再登記一筆
</button>

</div>

</div>

<div class="footer">
Houcihu Onsite Waitlist System
</div>

<script src="sheets.js"></script>

<script>
// ===================================
// 送出表單
// ===================================
document.getElementById("waitForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  const btn =
    document.getElementById("submitBtn");

  const loading =
    document.getElementById("loading");

  btn.disabled = true;
  loading.style.display = "block";

  const name =
    document.getElementById("name").value.trim();

  const phone =
    document.getElementById("phone").value.trim();

  const count =
    document.getElementById("count").value;

  const session =
    document.getElementById("session").value || "現場安排";

  const note =
    document.getElementById("note").value.trim();

  // 產生號碼
  const data = await cloudGet();

  let counter = 1;

  if(data && data.counter){
    counter = data.counter;
  }

  const no =
    "A" +
    String(counter).padStart(3,"0");

  // 新增候補
  const ok = await addQueue(
    name,
    count,
    session
  );

  btn.disabled = false;
  loading.style.display = "none";

  if(!ok){
    alert("送出失敗，請稍後再試");
    return;
  }

  // 顯示成功
  document.getElementById("formCard").style.display = "none";
  document.getElementById("successCard").style.display = "block";
  document.getElementById("ticketNo").innerText = no;

});
</script>

</body>
</html>
