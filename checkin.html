<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜現場候補登記</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>現場候補登記</h1>
<p>請填寫資料後送出</p>
</header>

<div class="wrap">

<div class="card">

<form id="waitForm">

<label>姓名</label>
<input type="text" id="name" required>

<label>手機號碼</label>
<input type="tel" id="phone" required>

<label>人數</label>
<select id="people">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
<option value="5">5 人</option>
</select>

<label>備註（選填）</label>
<textarea id="note"></textarea>

<button type="submit">送出登記</button>

</form>

</div>

<div class="card" id="successBox" style="display:none">

<h2>登記成功</h2>
<div class="big" id="ticketNo">A001</div>

<p>
請留意現場叫號，是否遞補成功依現場名額為準。
</p>

<button onclick="location.reload()">
再登記一筆
</button>

</div>

</div>

<script src="sheets.js"></script>

<script>
document.getElementById("waitForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const name =
document.getElementById("name").value;

const phone =
document.getElementById("phone").value;

const people =
document.getElementById("people").value;

const data = await cloudGet();

let no = "A001";

if(data && data.counter){
no = "A" + String(data.counter).padStart(3,"0");
}

const ok = await addQueue(name,people,"現場");

if(ok){

document.querySelector("form").style.display="none";
document.getElementById("successBox").style.display="block";
document.getElementById("ticketNo").innerText=no;

}else{
alert("送出失敗");
}

});
</script>

</body>
</html>
