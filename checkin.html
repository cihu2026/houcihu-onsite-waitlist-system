<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜現場候補登記</title>

<style>
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--gray:#666;
--orange:#d98b00;
--red:#d33;
--bg1:#eef6ef;
--bg2:#dfeee2;
--card:#fff;
--line:#e9ece9;
--shadow:0 12px 28px rgba(0,0,0,.08);
--radius:24px;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:#1f2d1f;
}

header{
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
text-align:center;
padding:42px 20px;
}

header h1{
margin:0;
font-size:32px;
font-weight:900;
}

header p{
margin:10px 0 0;
font-size:16px;
opacity:.95;
}

.wrap{
max-width:620px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:var(--radius);
padding:24px;
margin-bottom:18px;
box-shadow:var(--shadow);
}

.notice{
background:#fff3cd;
border-left:6px solid #d6a400;
padding:15px;
font-weight:800;
color:#8a6d3b;
font-size:14px;
line-height:1.8;
}

label{
display:block;
margin-top:16px;
margin-bottom:6px;
font-weight:900;
color:var(--green);
}

input,select{
width:100%;
padding:14px;
border:1px solid #d9dfd9;
border-radius:14px;
font-size:16px;
outline:none;
background:#fff;
}

input:focus,select:focus{
border-color:var(--green);
box-shadow:0 0 0 3px rgba(31,122,63,.12);
}

.slotinfo{
margin-top:14px;
padding:12px;
border-radius:14px;
font-weight:900;
text-align:center;
background:#f7faf7;
}

.green{color:var(--green);}
.orange{color:var(--orange);}
.red{color:var(--red);}
.gray{background:var(--gray);}

.option{
margin-top:18px;
padding:16px;
border-radius:18px;
background:#f8faf8;
border:1px solid var(--line);
}

.option label{
display:flex;
gap:10px;
align-items:flex-start;
margin:10px 0;
color:#333;
font-weight:700;
}

.option input[type="radio"]{
width:auto;
margin-top:4px;
}

button{
margin-top:22px;
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:var(--green);
color:#fff;
font-size:20px;
font-weight:900;
cursor:pointer;
}

button:disabled{
opacity:.7;
}

.big{
font-size:64px;
font-weight:900;
text-align:center;
color:var(--green);
margin:10px 0;
}

.btn{
display:block;
text-decoration:none;
text-align:center;
padding:15px;
border-radius:14px;
color:#fff;
font-weight:900;
}

footer{
text-align:center;
padding:20px;
color:#666;
font-size:13px;
}

@media(max-width:480px){

header h1{font-size:26px;}
.big{font-size:48px;}
.wrap{padding:15px;}

}
</style>
</head>

<body>

<header>
<h1>現場候補登記</h1>
<p>請填寫資料完成候補申請</p>
</header>

<div class="wrap">

<div class="card notice">
⚠️ 現場遞補不代表一定有名額，請依現場叫號與工作人員安排為準。
</div>

<div class="card" id="formBox">

<form id="waitForm">

<label>姓名</label>
<input type="text" id="name" placeholder="請輸入姓名" required>

<label>手機號碼</label>
<input type="tel" id="phone" placeholder="例如：0912345678" required>

<label>人數</label>
<select id="people">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
<option value="5+">5 人</option>
</select>

<label>選擇梯次</label>
<select id="slot"></select>

<div class="slotinfo" id="slotInfo">
讀取梯次資訊中...
</div>

<div class="option">
<div style="font-weight:900;color:var(--green);margin-bottom:8px;">
候補安排意願
</div>

<label>
<input type="radio" name="flex" value="接受其他梯次" checked>
<span>若原梯次額滿，可接受安排其他相近梯次。</span>
</label>

<label>
<input type="radio" name="flex" value="僅原梯次">
<span>僅接受原選梯次候補。</span>
</label>

</div>

<button type="submit" id="submitBtn">
確認送出登記
</button>

</form>

</div>

<div class="card" id="successBox" style="display:none;">

<h2 style="text-align:center;color:var(--green);margin-top:0;">
登記成功
</h2>

<div class="big" id="ticketNo">
A000
</div>

<p style="text-align:center;font-weight:900;">
您的候補號碼
</p>

<p style="text-align:center;color:#666;font-size:14px;line-height:1.8;">
請截圖保存畫面並留意現場看板叫號。<br>
過號需重新排隊。
</p>

<p style="text-align:center;color:#666;font-size:13px;" id="timeText">
</p>

<a href="visitor.html" class="btn gray">
返回首頁
</a>

</div>

</div>

<footer>
Houcihu Visitor Service Center © 2026
</footer>

<script src="sheets.js?v=11"></script>

<script>

// 載入梯次
async function loadSlots(){

const rows = await getSessions();

const slot =
document.getElementById("slot");

slot.innerHTML="";

for(let i=1;i<rows.length;i++){

const no   = rows[i][0];
const open = rows[i][1];
const cap  = Number(rows[i][2]);

if(!open) continue;

let txt =
cap<=0
? `第 ${no} 梯（額滿候補）`
: `第 ${no} 梯（餘 ${cap} 位）`;

slot.innerHTML +=
`<option value="第${no}梯">${txt}</option>`;

}

showSlotInfo();

}

// 梯次說明
async function showSlotInfo(){

const rows = await getSessions();

const val =
document.getElementById("slot").value;

const no =
val.replace(/[^0-9]/g,"");

const box =
document.getElementById("slotInfo");

for(let i=1;i<rows.length;i++){

if(String(rows[i][0])===no){

const cap =
Number(rows[i][2]);

if(cap<=0){

box.className="slotinfo red";
box.innerText=
"● 目前額滿，登記後需等待遞補";

}else if(cap<=3){

box.className="slotinfo orange";
box.innerText=
`● 剩餘名額極少（${cap} 位）`;

}else{

box.className="slotinfo green";
box.innerText=
`● 目前尚有名額（${cap} 位）`;

}

}

}

}

document
.getElementById("slot")
.addEventListener("change",showSlotInfo);

// 取得唯一號碼
function makeNumber(rows){

let max=0;

for(let i=1;i<rows.length;i++){

const no = String(rows[i][0]||"")
.replace("A","");

const num = Number(no);

if(num>max) max=num;

}

return "A"+String(max+1).padStart(3,"0");

}

// 送出
document
.getElementById("waitForm")
.addEventListener("submit",
async function(e){

e.preventDefault();

const btn =
document.getElementById("submitBtn");

btn.disabled=true;
btn.innerText="送出中...";

const name =
document.getElementById("name")
.value.trim();

const phone =
document.getElementById("phone")
.value.trim();

if(!/^09\d{8}$/.test(phone)){

alert("請輸入正確手機號碼");

btn.disabled=false;
btn.innerText="確認送出登記";
return;

}

// 團體轉人工
const people =
document.getElementById("people")
.value;

if(people==="5+"){

alert(
"多人同行需求，請由現場服務人員協助安排。"
);

btn.disabled=false;
btn.innerText="確認送出登記";
return;

}

const rows =
await cloudGet();

// 防手機重複
for(let i=1;i<rows.length;i++){

if(rows[i][2]===phone &&
rows[i][5]!=="cancel"){

alert("此手機已登記候補名單");

btn.disabled=false;
btn.innerText="確認送出登記";
return;

}

}

const no =
makeNumber(rows);

const slot =
document.getElementById("slot")
.value;

const flex =
document.querySelector(
'input[name="flex"]:checked'
).value;

const result =
await addQueue(
no,
name,
phone,
people,
slot+"｜"+flex
);

if(result){

document
.getElementById("formBox")
.style.display="none";

document
.getElementById("successBox")
.style.display="block";

document
.getElementById("ticketNo")
.innerText=no;

document
.getElementById("timeText")
.innerText=
"登記時間："+new Date()
.toLocaleString();

window.scrollTo(0,0);

}else{

alert("系統忙碌中，請稍後再試");

btn.disabled=false;
btn.innerText="確認送出登記";

}

});

loadSlots();

</script>

</body>
</html>
