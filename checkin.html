<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜現場候補登記</title>
<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,#eef6ef,#dfeee2);
color:#1f2d1f;
}

header{
background:linear-gradient(135deg,#1f5f35,#3e8b55);
color:#fff;
text-align:center;
padding:28px 18px;
}

header h1{
margin:0;
font-size:32px;
}

header p{
margin:10px 0 0;
opacity:.95;
}

.wrap{
max-width:760px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:22px;
padding:24px;
margin-bottom:18px;
box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.big{
font-size:64px;
font-weight:900;
text-align:center;
color:#1f7a3f;
}

label{
display:block;
margin:0 0 8px;
font-weight:800;
}

input,select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:14px;
font-size:17px;
box-sizing:border-box;
margin-bottom:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#1f7a3f;
color:#fff;
font-size:22px;
font-weight:900;
cursor:pointer;
}

.slotrow{
padding:10px 0;
border-bottom:1px solid #eee;
font-weight:700;
}

.green{color:#1f7a3f;}
.orange{color:#d98b00;}
.gray{color:#888;}
.red{color:#d33;}

.tip{
background:#f7faf7;
border-left:5px solid #1f7a3f;
padding:12px;
line-height:1.8;
}

@media(max-width:768px){

.big{font-size:52px;}

button{
font-size:20px;
}

}
</style>
</head>

<body>

<header>
<h1>後慈湖 現場候補登記</h1>
<p>請填寫資料後送出</p>
</header>

<div class="wrap">

<!-- 梯次資訊 -->
<div class="card">

<h2>今日梯次資訊</h2>

<div id="bestSlot" class="tip">
讀取中...
</div>

<br>

<div id="slotInfo"></div>

</div>

<!-- 表單 -->
<div class="card">

<form id="waitForm">

<label>姓名</label>
<input type="text" id="name" required>

<label>手機號碼</label>
<input type="tel" id="phone" required>

<label>人數</label>
<select id="people">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
<option value="5">5 人</option>
<option value="6">6 人</option>
<option value="7">7 人</option>
<option value="8">8 人</option>
<option value="9">9 人</option>
<option value="10">10 人</option>
</select>

<button type="submit">
送出登記
</button>

</form>

</div>

<!-- 成功 -->
<div class="card" id="successBox" style="display:none">

<h2>登記成功</h2>

<div class="big" id="ticketNo">
A001
</div>

<p>
請留意現場叫號，現場遞補不代表一定有名額。
</p>

<button onclick="location.reload()">
再登記一筆
</button>

</div>

</div>

<script src="sheets.js?v=6"></script>

<script>
// =========================
// 梯次規則
// =========================
function getOpenSessions(){

const now = new Date();
const limit = new Date("2026-06-21");

if(now < limit){
return [1,3,5,7];
}

return [1,2,3,4,5,6,7,8];
}

// =========================
function getCap(no){

const v =
localStorage.getItem(
"session_cap_"+no
);

if(v===null) return 5;

return Number(v);
}

// =========================
// 顯示梯次
// =========================
function renderSlots(){

const box =
document.getElementById("slotInfo");

const best =
document.getElementById("bestSlot");

box.innerHTML="";

const opens =
getOpenSessions();

let bestNo = 0;
let bestCap = -1;

for(let i=1;i<=8;i++){

let text="";
let cls="gray";

if(!opens.includes(i)){

text="未開放";

}else{

const cap=getCap(i);

if(cap>bestCap){
bestCap=cap;
bestNo=i;
}

if(cap>0){

text="可遞補（剩 "+cap+" 位）";
cls="green";

}else{

text="額滿，可候補等待";
cls="orange";

}

}

box.innerHTML += `
<div class="slotrow ${cls}">
第${i}梯　${text}
</div>
`;

}

if(bestCap>0){

best.innerHTML =
"建議候補：第"+bestNo+
"梯（剩 "+bestCap+" 位）";

}else{

best.innerHTML =
"目前各梯次已滿，可先登記等待遞補。";

}

}

// =========================
// 送出
// =========================
document.getElementById("waitForm")
.addEventListener("submit",
async function(e){

e.preventDefault();

const name =
document.getElementById("name").value;

const phone =
document.getElementById("phone").value;

const people =
document.getElementById("people").value;

const rows =
await cloudGet();

const no =
"A"+String(rows.length).padStart(3,"0");

const ok =
await fetch(WEB_APP_URL,{
method:"POST",
body:new URLSearchParams({
action:"add",
number:no,
name:name,
phone:phone,
people:people,
slot:"現場",
status:"waiting"
})
});

if(ok){

document.querySelector("form")
.style.display="none";

document.getElementById(
"successBox"
).style.display="block";

document.getElementById(
"ticketNo"
).innerText=no;

}else{

alert("送出失敗");

}

});

// =========================
renderSlots();
setInterval(renderSlots,5000);

</script>

</body>
</html>
