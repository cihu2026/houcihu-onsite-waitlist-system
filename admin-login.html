<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Abby Luo">
<meta name="generator" content="Houcihu Admin Login v11">
<title>後慈湖｜後台登入</title>
<link rel="stylesheet" href="style.css">

<style>
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--red:#d33;
--line:#e7ece7;
}

.msg{
margin-top:16px;
text-align:center;
font-weight:900;
font-size:16px;
min-height:24px;
}

label{
display:block;
margin:14px 0 8px;
font-weight:900;
}

input{
width:100%;
padding:15px;
border:1px solid var(--line);
border-radius:16px;
font-size:16px;
outline:none;
box-sizing:border-box;
}

input:focus{
border-color:var(--green);
box-shadow:0 0 0 3px rgba(31,122,63,.12);
}

button{
width:100%;
margin-top:18px;
padding:16px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
font-size:18px;
font-weight:900;
cursor:pointer;
}

button:active{
transform:scale(.98);
}

.small{
margin-top:18px;
text-align:center;
color:#666;
line-height:1.8;
font-size:14px;
}

.credit{
margin-top:10px;
text-align:center;
font-size:13px;
color:#888;
}

.secure{
margin-top:14px;
text-align:center;
font-size:14px;
color:#1f7a3f;
font-weight:800;
}

.wrap{
max-width:520px;
}
</style>
</head>

<body>

<header class="hero">
<h1>後台登入</h1>
<p>後慈湖 現場管理系統 v11</p>
</header>

<div class="wrap">

<div class="card">

<form id="loginForm">

<label>帳號</label>
<input
type="text"
id="user"
placeholder="請輸入帳號"
autocomplete="username"
required>

<label>密碼</label>
<input
type="password"
id="pass"
placeholder="請輸入密碼"
autocomplete="current-password"
required>

<button type="submit" id="loginBtn">
登入後台
</button>

</form>

<div id="msg" class="msg"></div>

<div class="secure">
🔒 僅限授權工作人員使用
</div>

<div class="small">
登入後可使用候補叫號、梯次管理、報表匯出等功能
</div>

<div class="credit">
Designed & Developed by Abby Luo
</div>

</div>

</div>

<script>
const ADMIN_USER="admin";
const ADMIN_PASS="1234";

const form =
document.getElementById("loginForm");

const msg =
document.getElementById("msg");

const btn =
document.getElementById("loginBtn");

function showMsg(text,color){

msg.innerText=text;
msg.style.color=color;

}

function createToken(){

const now=Date.now();

const expire =
now + (12*60*60*1000); //12hr

const token = {
auth:true,
time:now,
expire:expire
};

localStorage.setItem(
"houcihu_admin_token",
JSON.stringify(token)
);

localStorage.setItem(
"houcihu_admin_login",
"yes"
);

}

form.addEventListener(
"submit",
function(e){

e.preventDefault();

const user =
document.getElementById("user")
.value.trim();

const pass =
document.getElementById("pass")
.value.trim();

btn.disabled=true;
btn.innerText="驗證中...";

setTimeout(function(){

if(
user===ADMIN_USER &&
pass===ADMIN_PASS
){

createToken();

showMsg(
"登入成功，跳轉中...",
"#1f7a3f"
);

btn.innerText="登入成功";

setTimeout(function(){

location.href="admin.html";

},500);

}else{

showMsg(
"帳號或密碼錯誤",
"#d33"
);

btn.disabled=false;
btn.innerText="登入後台";

}

},500);

});

// Enter 鍵優化
document.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){
form.requestSubmit();
}

});
</script>

</body>
</html>
