<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜後台登入</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
  background:linear-gradient(135deg,#eef6ef,#dfeee2);
  color:#1f2d1f;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:24px;
  padding:30px 24px;
  box-shadow:0 16px 36px rgba(0,0,0,.10);
}

h1{
  margin:0 0 8px;
  text-align:center;
  font-size:30px;
}

.sub{
  text-align:center;
  color:#666;
  margin-bottom:24px;
}

label{
  display:block;
  margin:14px 0 8px;
  font-weight:700;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #d9dfd9;
  border-radius:14px;
  box-sizing:border-box;
  font-size:17px;
}

input:focus{
  outline:none;
  border-color:#1f7a3f;
  box-shadow:0 0 0 3px rgba(31,122,63,.12);
}

button{
  width:100%;
  margin-top:18px;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#1f7a3f;
  color:#fff;
  font-size:20px;
  font-weight:800;
  cursor:pointer;
}

.msg{
  text-align:center;
  margin-top:14px;
  font-weight:700;
}

.red{color:#d33;}
.green{color:#1f7a3f;}

.small{
  margin-top:18px;
  color:#666;
  font-size:14px;
  line-height:1.7;
  text-align:center;
}

.linkbtn{
  background:#666;
  margin-top:10px;
}

@media(max-width:768px){

  .box{
    margin:16px;
    padding:24px 18px;
  }

  h1{
    font-size:26px;
  }

  button{
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="box">

<h1>後台登入</h1>
<div class="sub">
後慈湖 現場管理系統
</div>

<form id="loginForm">

<label>帳號</label>
<input type="text" id="user" placeholder="請輸入帳號" required>

<label>密碼</label>
<input type="password" id="pass" placeholder="請輸入密碼" required>

<button type="submit">
登入後台
</button>

</form>

<div class="msg" id="msg"></div>

<button class="linkbtn"
onclick="location.href='visitor.html'">
返回首頁
</button>

<div class="small">
建議僅工作人員使用。<br>
登入成功後將進入 admin.html
</div>

</div>

<script>
// ==================================
// 可自行修改帳密
// ==================================
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

// ==================================
document.getElementById("loginForm")
.addEventListener("submit", function(e){

e.preventDefault();

const user =
document.getElementById("user").value.trim();

const pass =
document.getElementById("pass").value.trim();

const msg =
document.getElementById("msg");

if(user === ADMIN_USER &&
   pass === ADMIN_PASS){

localStorage.setItem(
"houcihu_admin_login","yes"
);

msg.className = "msg green";
msg.innerText = "登入成功，跳轉中...";

setTimeout(()=>{

location.href = "admin.html";

},700);

}else{

msg.className = "msg red";
msg.innerText = "帳號或密碼錯誤";

}

});
</script>

</body>
</html>
