<!-- admin-login.html -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Abby Luo">
<meta name="generator" content="Houcihu Admin Login v9">
<title>後慈湖｜後台登入</title>
<link rel="stylesheet" href="style.css">

<style>
.msg{
margin-top:16px;
text-align:center;
font-weight:900;
color:#d33;
}

label{
display:block;
margin:14px 0 8px;
font-weight:900;
}

.small{
margin-top:16px;
text-align:center;
color:#666;
line-height:1.8;
}
</style>
</head>

<body>

<header class="hero">
<h1>後台登入</h1>
<p>後慈湖 現場管理系統</p>
</header>

<div class="wrap">

<div class="card">

<form id="loginForm">

<label>帳號</label>
<input type="text" id="user" placeholder="請輸入帳號" required>

<label>密碼</label>
<input type="password" id="pass" placeholder="請輸入密碼" required>

<button type="submit">
登入後台
</button>

</form>

<div id="msg" class="msg"></div>

<div class="small">
僅限工作人員使用
</div>

</div>

</div>

<script>
const ADMIN_USER="admin";
const ADMIN_PASS="1234";

document.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

const user =
document.getElementById("user").value.trim();

const pass =
document.getElementById("pass").value.trim();

const msg =
document.getElementById("msg");

if(
user===ADMIN_USER &&
pass===ADMIN_PASS
){

localStorage.setItem(
"houcihu_admin_login",
"yes"
);

msg.style.color="#1f7a3f";
msg.innerText="登入成功，跳轉中...";

setTimeout(function(){

location.href="admin.html";

},500);

}else{

msg.style.color="#d33";
msg.innerText="帳號或密碼錯誤";

}

});
</script>

</body>
</html>
