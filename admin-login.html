<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#155f34">
<meta name="author" content="Abby Luo">
<title>後慈湖｜後台登入</title>
<link rel="stylesheet" href="theme.css?v=14">
<style>
  #loginBtn{position:relative;z-index:5;pointer-events:auto;touch-action:manipulation;-webkit-user-select:none;user-select:none}
  #loginForm{position:relative;z-index:3}
  .password-wrap{position:relative}
  .password-wrap input{padding-right:82px!important}
  .password-wrap .showpass{
    position:absolute!important;
    right:8px!important;
    top:8px!important;
    width:auto!important;
    min-width:58px!important;
    max-width:66px!important;
    min-height:38px!important;
    padding:8px 10px!important;
    border-radius:12px!important;
    box-shadow:none!important;
    z-index:6!important;
    pointer-events:auto!important;
    display:inline-flex!important;
  }
</style>
</head>
<body>
<header class="hero"><div class="hero__kicker">STAFF ONLY</div><h1>後台登入</h1><p>後慈湖現場候補管理系統｜僅限授權工作人員使用</p></header>
<main class="wrap narrow">
  <section class="card">
    <div class="notice" style="margin-bottom:16px">🔒 登入時會先向 Apps Script 驗證後台金鑰；金鑰錯誤將無法進入後台。</div>
    <form id="loginForm" novalidate onsubmit="return handleLogin(event)">
      <div class="field"><label for="user">帳號</label><input type="text" id="user" placeholder="請輸入帳號" autocomplete="username" required></div>
      <div class="field"><label for="pass">後台金鑰／密碼</label><div class="password-wrap"><input type="password" id="pass" placeholder="請輸入後台金鑰" autocomplete="current-password" required><button type="button" class="smallbtn gray showpass" onclick="togglePass(event)">顯示</button></div></div>
      <button class="block" type="button" id="loginBtn" onclick="handleLogin(event)">登入後台</button>
    </form>
    <div id="msg" class="sub" style="min-height:24px;font-weight:950"></div>
    <div class="grid two" style="margin-top:14px"><a class="btn block gray" href="visitor.html">返回旅客首頁</a><button type="button" class="block orange" onclick="clearBox()">清除內容</button></div>
  </section>
  <section class="card compact"><div class="muted" style="text-align:center;font-weight:800;line-height:1.8">系統採用本機登入憑證保存，12 小時後自動失效。<br>正式權限由 Apps Script 後端金鑰判斷。</div></section>
</main>
<script src="sheets.js?v=14.3"></script>
<script>
const form = document.getElementById("loginForm");
const msg = document.getElementById("msg");
const loginBtn = document.getElementById("loginBtn");
let loginBusy = false;

function resetLoginButton(){
  loginBusy = false;
  loginBtn.disabled = false;
  loginBtn.removeAttribute("disabled");
  loginBtn.innerText = "登入後台";
}

resetLoginButton();

(function autoCheck(){
  try{
    const raw = localStorage.getItem("houcihu_admin_token");
    if(!raw) return;
    const token = JSON.parse(raw);
    if(token.auth && Date.now() < token.expire && token.apiKey){ location.href = "admin.html"; }
  }catch(error){
    localStorage.removeItem("houcihu_admin_token");
    localStorage.removeItem("houcihu_admin_api_key");
  }
})();

function showMsg(text, color){ msg.innerText = text; msg.style.color = color; }
function createToken(apiKey){
  const now = Date.now();
  localStorage.setItem("houcihu_admin_token", JSON.stringify({ auth:true, time:now, expire:now + 12 * 60 * 60 * 1000, apiKey }));
  localStorage.setItem("houcihu_admin_api_key", apiKey);
  localStorage.setItem("houcihu_admin_login", "yes");
}
function clearToken(){
  localStorage.removeItem("houcihu_admin_token");
  localStorage.removeItem("houcihu_admin_api_key");
  localStorage.removeItem("houcihu_admin_login");
}
function togglePass(event){
  event.preventDefault();
  event.stopPropagation();
  const p = document.getElementById("pass");
  const btn = event.currentTarget;
  p.type = p.type === "password" ? "text" : "password";
  btn.innerText = p.type === "password" ? "顯示" : "隱藏";
}
function clearBox(){
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
  showMsg("", "#647164");
  resetLoginButton();
}
async function verifyAdminKey(apiKey){
  const result = await apiGet({ mode:"queue", key:apiKey }, 0);
  return Array.isArray(result) && Array.isArray(result[0]) && result[0].includes("號碼") && result[0].includes("電話");
}

async function handleLogin(event){
  if(event){
    event.preventDefault();
    event.stopPropagation();
  }
  if(loginBusy) return false;

  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();
  if(!user || !pass){ showMsg("請輸入帳號與後台金鑰", "#cf2f2f"); return false; }

  clearToken();
  loginBusy = true;
  loginBtn.disabled = true;
  loginBtn.innerText = "驗證中...";
  showMsg("正在驗證後台金鑰...", "#647164");

  try{
    const ok = await verifyAdminKey(pass);
    if(!ok){
      showMsg("後台金鑰錯誤，無法進入後台", "#cf2f2f");
      resetLoginButton();
      return false;
    }
    createToken(pass);
    showMsg("驗證成功，跳轉中...", "#155f34");
    loginBtn.innerText = "登入成功";
    setTimeout(function(){ location.href = "admin.html"; }, 350);
  }catch(error){
    console.warn(error);
    showMsg("驗證失敗，請確認網路或 Apps Script 部署狀態", "#cf2f2f");
    resetLoginButton();
  }
  return false;
}

form.addEventListener("submit", handleLogin);
loginBtn.addEventListener("click", handleLogin);
document.getElementById("pass").addEventListener("keydown", function(event){
  if(event.key === "Enter") handleLogin(event);
});
</script>
</body>
</html>
