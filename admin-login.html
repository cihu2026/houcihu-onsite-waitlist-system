<!-- admin-login.html -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜後台登入</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
<h1>後台登入</h1>
<p>後慈湖 現場管理系統</p>
</header>

<div class="wrap">

<div class="card">

<form id="loginForm">

<label>帳號</label>
<input type="text" id="user" required>

<label>密碼</label>
<input type="password" id="pass" required>

<button type="submit">登入後台</button>

</form>

<div id="msg"></div>

</div>

</div>

<script>
const ADMIN_USER="admin";
const ADMIN_PASS="1234";

document.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

if(
document.getElementById("user").value===ADMIN_USER &&
document.getElementById("pass").value===ADMIN_PASS
){

localStorage.setItem(
"houcihu_admin_login","yes"
);

location.href="admin.html";

}else{

document.getElementById("msg")
.innerText="帳號或密碼錯誤";

}

});
</script>

</body>
</html>
