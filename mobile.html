<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜手機管理版</title>
<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,#eef6ef,#dfeee2);
color:#1f2d1f;
}

header{
background:linear-gradient(135deg,#1f5f35,#3e8b55);
color:#fff;
text-align:center;
padding:24px 16px;
}

header h1{
margin:0;
font-size:30px;
font-weight:900;
}

header p{
margin:8px 0 0;
font-size:16px;
opacity:.95;
}

.wrap{
max-width:700px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
border-radius:22px;
padding:20px;
margin-bottom:16px;
box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.big{
font-size:56px;
font-weight:900;
text-align:center;
color:#1f7a3f;
line-height:1;
}

.sub{
text-align:center;
color:#666;
margin-top:8px;
}

.notice{
background:#fff3cd;
border-left:6px solid #d6a400;
font-weight:800;
color:#8a6d3b;
line-height:1.8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

button,a.btn{
display:block;
width:100%;
text-decoration:none;
text-align:center;
padding:16px;
border:none;
border-radius:16px;
background:#1f7a3f;
color:#fff;
font-size:18px;
font-weight:900;
cursor:pointer;
box-sizing:border-box;
}

.red{background:#d33;}
.gray{background:#666;}
.blue{background:#2c69c9;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
font-size:14px;
}

th{
background:#f7faf7;
}

.smallbtn{
padding:8px 10px;
font-size:13px;
border-radius:10px;
width:auto;
display:inline-block;
margin:2px;
}

.wait{color:#1f7a3f;font-weight:700;}
.called{color:#d98b00;font-weight:700;}
.done{color:#2c69c9;font-weight:700;}
.cancel{color:#d33;font-weight:700;}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.big{
font-size:46px;
}

header h1{
font-size:26px;
}

}
</style>
</head>

<body>

<header>
<h1>後慈湖 手機管理版</h1>
<p>快速叫號｜名單查看｜即時同步</p>
</header>

<div class="wrap">

<div class="card notice">
現場遞補不代表一定有名額
</div>

<!-- 目前叫號 -->
<div class="card">

<div class="big" id="currentNo">
A000
</div>

<div class="sub">
目前叫號
</div>

</div>

<!-- 快速操作 -->
<div class="card">

<div class="grid">

<button onclick="callNextAndReload()">
下一號叫號
</button>

<button class="blue"
onclick="loadAdmin()">
立即刷新
</button>

<button class="red"
onclick="clearToday()">
清空名單
</button>

<a class="btn gray"
href="admin.html">
完整後台
</a>

</div>

</div>

<!-- 候補名單 -->
<div class="card">

<h2>候補名單</h2>

<div style="overflow:auto;max-height:420px;">

<table>

<thead>
<tr>
<th>號碼</th>
<th>姓名</th>
<th>狀態</th>
<th>操作</th>
</tr>
</thead>

<tbody id="tbody">
<tr>
<td colspan="4">載入中...</td>
</tr>
</tbody>

</table>

</div>

</div>

</div>

<script src="sheets.js?v=3"></script>

<script>
async function loadAdmin(){

const rows = await cloudGet();

const tbody =
document.getElementById("tbody");

const current =
document.getElementById("currentNo");

if(!rows || rows.length<=1){

tbody.innerHTML =
"<tr><td colspan='4'>目前無資料</td></tr>";

current.innerText="A000";

return;

}

tbody.innerHTML="";

let now="A000";

for(let i=1;i<rows.length;i++){

const rowNo=i+1;

const no=rows[i][0];
const name=rows[i][1];
const status=rows[i][5];

let txt="等待中";
let cls="wait";

if(status==="called"){
txt="已叫號";
cls="called";
now=no;
}

if(status==="done"){
txt="已到場";
cls="done";
}

if(status==="cancel"){
txt="取消";
cls="cancel";
}

tbody.innerHTML += `
<tr>

<td>${no}</td>

<td>${name}</td>

<td class="${cls}">
${txt}
</td>

<td>

<button class="smallbtn"
onclick="doneGuest(${rowNo})">
到場
</button>

<button class="smallbtn red"
onclick="cancelGuest(${rowNo})">
取消
</button>

</td>

</tr>
`;

}

current.innerText=now;

}

async function doneGuest(row){

await updateStatus(
row,
"done"
);

loadAdmin();

}

async function cancelGuest(row){

await updateStatus(
row,
"cancel"
);

loadAdmin();

}

async function callNextAndReload(){

const rows =
await cloudGet();

for(let i=1;i<rows.length;i++){

if(rows[i][5]==="waiting"){

await updateStatus(
i+1,
"called"
);

break;

}

}

loadAdmin();

}

async function clearToday(){

if(confirm("確定清空今日名單？")){

await clearQueue();
loadAdmin();

}

}

loadAdmin();

setInterval(
loadAdmin,
3000
);
</script>

</body>
</html>
