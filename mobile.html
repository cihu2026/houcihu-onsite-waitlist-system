<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>後慈湖｜工作人員手機版</title>
<link rel="stylesheet" href="style.css">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
  background:#eef3ef;
  color:#1f2d1f;
}

header{
  background:linear-gradient(135deg,#1f5f35,#3e8b55);
  color:#fff;
  padding:18px 16px calc(18px + env(safe-area-inset-top));
  text-align:center;
  position:sticky;
  top:0;
  z-index:99;
}

header h1{
  margin:0;
  font-size:24px;
}

header p{
  margin:6px 0 0;
  font-size:14px;
  opacity:.95;
}

.wrap{
  padding:16px;
  max-width:760px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 10px 24px rgba(0,0,0,.08);
}

.big{
  font-size:58px;
  font-weight:900;
  text-align:center;
  color:#1f7a3f;
  line-height:1;
}

.sub{
  text-align:center;
  color:#666;
  margin-top:8px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

.green{ background:#1f7a3f; color:#fff; }
.blue{ background:#3a6ea5; color:#fff; }
.orange{ background:#d98b00; color:#fff; }
.red{ background:#d43c3c; color:#fff; }
.gray{ background:#888; color:#fff; }

.list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  border:1px solid #e7ece7;
  border-radius:16px;
  padding:14px;
}

.row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
}

.no{
  font-size:28px;
  font-weight:900;
  color:#1f7a3f;
}

.name{
  font-size:18px;
  font-weight:700;
}

.meta{
  color:#666;
  font-size:14px;
  margin-top:6px;
}

.tag{
  padding:6px 10px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
}

.wait{ background:#eef8f0; color:#1f7a3f; }
.call{ background:#fff4dd; color:#b27300; }
.done{ background:#e8eef8; color:#3a6ea5; }
.cancel{ background:#fdeaea; color:#d43c3c; }

.small-btn{
  padding:10px;
  font-size:14px;
  border-radius:10px;
}

.footer-space{
  height:18px;
}

@media(max-width:480px){

  .big{
    font-size:46px;
  }

  .grid2{
    grid-template-columns:1fr;
  }

  button{
    font-size:17px;
  }
}
</style>
</head>

<body>

<header>
<h1>後慈湖 工作人員手機版</h1>
<p>叫號｜候補｜快速操作</p>
</header>

<div class="wrap">

<!-- 目前叫號 -->
<div class="card">
<div class="big" id="currentNo">A000</div>
<div class="sub">目前叫號</div>
</div>

<!-- 快速操作 -->
<div class="card">

<div class="grid2">

<button class="green" onclick="callNext()">
下一號叫號
</button>

<button class="blue" onclick="refreshNow(renderUI)">
立即刷新
</button>

<button class="orange" onclick="location.href='screen.html'">
開啟看板
</button>

<button class="red" onclick="clearQueueConfirm()">
清空候補
</button>

</div>

</div>

<!-- 統計 -->
<div class="card">
<div class="grid2">

<div>
<div class="sub">等待組數</div>
<div class="big" style="font-size:42px" id="waitCount">0</div>
</div>

<div>
<div class="sub">總名單</div>
<div class="big" style="font-size:42px" id="totalCount">0</div>
</div>

</div>
</div>

<!-- 候補名單 -->
<div class="card">
<h2 style="margin-top:0;">候補名單</h2>

<div class="list" id="queueList">
載入中...
</div>

</div>

<div class="footer-space"></div>

</div>

<script src="sheets.js"></script>

<script>
// ===================================
// UI Render
// ===================================
function renderUI(data){

  if(!data) return;

  document.getElementById("currentNo").innerText =
    data.current || "A000";

  const queue =
    data.queue || [];

  const waiting =
    queue.filter(v=>v.status==="waiting").length;

  document.getElementById("waitCount").innerText =
    waiting;

  document.getElementById("totalCount").innerText =
    queue.length;

  const box =
    document.getElementById("queueList");

  if(queue.length===0){
    box.innerHTML = "目前無資料";
    return;
  }

  box.innerHTML = "";

  queue.slice().reverse().forEach(item=>{

    let cls = "wait";
    let txt = "等待中";

    if(item.status==="called"){
      cls="call"; txt="已叫號";
    }
    if(item.status==="done"){
      cls="done"; txt="已到場";
    }
    if(item.status==="cancel"){
      cls="cancel"; txt="取消";
    }

    box.innerHTML += `
    <div class="item">

      <div class="row">
        <div class="no">${item.number}</div>
        <div class="tag ${cls}">${txt}</div>
      </div>

      <div class="name">
        ${item.name || ""}
      </div>

      <div class="meta">
        ${item.people || 1} 人　
        第${item.slot || "?"}梯　
        ${item.time || ""}
      </div>

      <div class="grid2" style="margin-top:10px">

        <button class="green small-btn"
        onclick="doneGuest('${item.number}')">
        到場
        </button>

        <button class="red small-btn"
        onclick="cancelGuest('${item.number}')">
        取消
        </button>

      </div>

    </div>
    `;
  });
}

// ===================================
// 操作
// ===================================
async function doneGuest(no){
  await doneNumber(no);
}

async function cancelGuest(no){
  await cancelNumber(no);
}

async function clearQueueConfirm(){

  if(confirm("確定清空今日候補名單？")){
    await clearQueue();
  }
}

// ===================================
// 啟動
// ===================================
initCloud().then(renderUI);
autoSync(renderUI,3000);
</script>

</body>
</html>
