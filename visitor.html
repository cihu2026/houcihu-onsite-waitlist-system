<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Houcihu 現場候補登記</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
  background:#eef3ef;
  color:#1f2d1f;
}
header{
  background:linear-gradient(135deg,#1f5f35,#3e8b55);
  color:#fff;
  text-align:center;
  padding:24px;
}
.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:20px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}
.small{
  font-size:15px;
  color:#555;
  line-height:1.7;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}
.slot{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.06);
}
.slot h3{
  margin:0 0 10px;
}
.status{
  font-size:18px;
  font-weight:700;
  color:#1f7a3f;
  margin-bottom:12px;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1f7a3f;
  color:#fff;
  font-size:16px;
  font-weight:700;
}
input,select{
  width:100%;
  padding:12px;
  border:1px solid #d7dfd7;
  border-radius:10px;
  margin-top:10px;
  font-size:16px;
}
.success{
  color:#1f7a3f;
  font-weight:700;
  font-size:18px;
}
.tip{
  font-size:14px;
  color:#777;
  margin-top:8px;
}
</style>
</head>

<body>

<header>
<h1>現場候補登記</h1>
<div>請先查看可遞補梯次</div>
</header>

<div class="wrap">

<!-- 說明 -->
<div class="card small">
本系統為現場候補登記，依當日名額與現場狀況安排。<br>
完成登記不代表保證入場，將依現場順序遞補。
</div>

<!-- 即時資訊 -->
<div class="card">
<div><strong>目前叫號：</strong><span class="current">A015</span></div>
<div class="tip">請留意現場看板與工作人員引導</div>
</div>

<!-- 梯次區 -->
<div class="grid" id="grid">

<div class="slot">
<h3>第3梯</h3>
<div>09:45 入場</div>
<div class="status">剩餘 6 位</div>
<button onclick="pickSession('第3梯 09:45')">加入候補</button>
</div>

<div class="slot">
<h3>第5梯</h3>
<div>10:45 入場</div>
<div class="status">剩餘 18 位</div>
<button onclick="pickSession('第5梯 10:45')">加入候補</button>
</div>

<div class="slot">
<h3>第7梯</h3>
<div>12:45 入場</div>
<div class="status">剩餘 8 位</div>
<button onclick="pickSession('第7梯 12:45')">加入候補</button>
</div>

</div>

<!-- 表單 -->
<div class="card" id="form" style="display:none">
<h2 id="pick"></h2>

<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">

<select id="count">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
<option value="5">5 人</option>
</select>

<button onclick="reg()">確認加入候補</button>

<div class="tip">
送出後將取得候補號碼，請留意叫號。
</div>
</div>

<!-- 結果 -->
<div class="card" id="msg">
<div class="success">尚未登記</div>
</div>

</div>

<script src="sheets.js"></script>
<script src="script.js"></script>

<script>
function pickSession(text){
  document.getElementById("form").style.display="block";
  document.getElementById("pick").innerText=text;
}

function reg(){
  const name=document.getElementById("name").value;
  if(!name){
    alert("請填寫姓名");
    return;
  }

  document.getElementById("msg").innerHTML=
  "<div class='success'>登記成功！</div>" +
  "<div>您的候補號碼：A023</div>" +
  "<div>目前叫號：A015</div>" +
  "<div class='tip'>完成登記不代表保證入場，請留意現場叫號。</div>";
}
</script>

</body>
</html>
