<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>現場遞補登記</title><link rel="stylesheet" href="style.css"></head><body>
<header><h1>現場遞補登記</h1><p>請選擇可登記梯次</p></header>
<div class="wrap">
<div class="grid" id="grid"></div>
<div class="card hidden" id="formCard">
<h2 id="pickText"></h2>
<input id="guestName" placeholder="姓名">
<input id="guestPhone" placeholder="電話">
<select id="guestCount"><option>1 人</option><option>2 人</option><option>3 人</option><option>4 人</option><option>5 人</option></select>
<button onclick="submitForm()">確認登記</button>
</div>
<div class="card msg" id="msg"></div>
</div>
<script src="script.js"></script></body></html>
