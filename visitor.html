<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜現場服務系統</title>

<style>
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--blue:#2c69c9;
--gray:#666;
--orange:#d98b00;
--bg1:#eef6ef;
--bg2:#dfeee2;
--card:#ffffff;
--text:#1f2d1f;
--muted:#666;
--shadow:0 12px 28px rgba(0,0,0,.08);
--radius:24px;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
background-attachment: fixed;
color:var(--text);
line-height:1.5;
}

header.hero{
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
text-align:center;
padding:48px 20px;
box-shadow:0 8px 22px rgba(0,0,0,.08);
}

header h1{ margin:0; font-size:32px; font-weight:900; }
header p{ margin:12px 0 0; font-size:16px; opacity:.9; }

.wrap{ max-width:600px; margin:auto; padding:20px; }

.card{
background:var(--card);
border-radius:var(--radius);
padding:24px;
margin-bottom:18px;
box-shadow:var(--shadow);
}

/* 即時資訊顯示區 */
.status-bar {
background: var(--green);
color: #fff;
text-align: center;
padding: 18px;
border-radius: 18px;
margin-top: -45px;
position: relative;
z-index: 10;
display: flex;
justify-content: space-around;
align-items: center;
}

.status-item { flex: 1; }
.status-item:first-child { border-right: 1px solid rgba(255,255,255,0.2); }

.status-bar span { font-size: 13px; opacity: 0.8; display: block; margin-bottom: 4px; }
.status-bar b { font-size: 26px; display: block; color: #9cffb4; font-family: monospace; }

.notice{
background:#fff3cd;
border-left:6px solid #d6a400;
font-weight:800;
color:#8a6d3b;
padding: 15px;
font-size: 14px;
}

.grid{
display:grid;
grid-template-columns: 1fr 1fr;
gap:12px;
margin-top: 10px;
}

.btn{
display:flex;
flex-direction: column;
align-items:center;
justify-content:center;
text-decoration:none;
background:var(--green);
color:#fff;
padding:20px 10px;
border-radius:18px;
font-weight:bold;
font-size:16px;
transition:.15s ease;
text-align:center;
min-height: 100px;
}

.btn:active{ transform:scale(0.95); opacity:0.9; }

.blue{background:var(--blue);}
.gray{background:var(--gray);}
.orange{background:var(--orange);}

.text{ font-size:15px; color:#444; line-height:1.8; }
h2 { font-size: 20px; margin-top: 0; color: var(--green); }

footer{ text-align:center; color:var(--muted); padding:20px; font-size:13px; }

@media(max-width:480px){
header h1{ font-size: 26px; }
.grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<header class="hero">
<h1>後慈湖 現場服務系統</h1>
<p>候補登記｜即時資訊｜現場叫號</p>
</header>

<div class="wrap">

<div class="status-bar card">
<div class="status-item">
<span>目前叫號</span>
<b id="quickNo">A000</b>
</div>
<div class="status-item">
<span>預約人數</span>
<b id="waitCount">0 / 10</b>
</div>
</div>

<div class="card notice">
⚠️ 現場遞補不代表一定有名額，實際入場資格依現場安排為準。
</div>

<div class="card">
<h2>快速服務 Quick Services</h2>
<div class="grid">
<a class="btn" href="checkin.html">📝 現場候補登記</a>
<a class="btn blue" href="status.html">📊 即時梯次資訊</a>
<a class="btn gray" href="screen.html">📢 查看叫號看板</a>
<a class="btn orange" href="calendar.html">📅 營運資訊</a>
</div>
</div>

<div class="card">
<h2>服務說明</h2>
<p class="text">
1. 現場額滿時可登記候補但不一定候補成功。<br>
2. 候補依釋出名額遞補，過號需重新排隊。<br>
3. 系統每 3 秒自動更新，請留意進度。<br>
4. 入場前請準備好身份證明文件供查驗。
</p>
</div>

</div>

<footer>
Houcihu Visitor Service Center &copy; 2026
</footer>

<script src="sheets.js?v=10.1"></script>
<script>
// 設定變數鎖，避免網路慢時重複請求
let isUpdating = false;

async function updateQuickStatus() {
    if (isUpdating) return;
    isUpdating = true;

    try {
        const rows = await cloudGet();
        let now = "A000";
        let waitingCount = 0;

        if (rows && rows.length > 1) {
            // 找最後一個叫號
            for (let i = rows.length - 1; i >= 1; i--) {
                if (rows[i][5] === "called") {
                    now = rows[i][0];
                    break;
                }
            }
            // 計算目前排隊中(waiting)的人數
            const waitingList = rows.filter((row, idx) => idx > 0 && row[5] === "waiting");
            waitingCount = waitingList.length;
        }
        
        document.getElementById("quickNo").innerText = now;
        document.getElementById("waitCount").innerText = `${waitingCount} / 10`;
        
        // 人滿變色提醒
        if (waitingCount >= 10) {
            document.getElementById("waitCount").style.color = "#ffcc00"; 
        } else {
            document.getElementById("waitCount").style.color = "#9cffb4";
        }

    } catch(e) {
        console.error("Update Error:", e);
        document.getElementById("quickNo").innerText = "---";
        document.getElementById("waitCount").innerText = "Error";
    } finally {
        isUpdating = false;
    }
}

// 初始化
updateQuickStatus();

// 核心修改：3000ms = 3秒 刷新一次
setInterval(updateQuickStatus, 3000);
</script>

</body>
</html>
