<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜營運資訊</title>

<style>
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--blue:#2c69c9;
--gray:#666;
--orange:#d98b00;
--red:#d33;
--bg1:#eef6ef;
--bg2:#dfeee2;
--card:#ffffff;
--text:#1f2d1f;
--muted:#666;
--line:#e9ece9;
--shadow:0 12px 28px rgba(0,0,0,.08);
--radius:24px;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
background-attachment: fixed;
color:var(--text);
line-height:1.5;
}

header{
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
text-align:center;
padding:42px 20px;
}

header h1{ margin:0; font-size:32px; font-weight:900; }
header p{ margin:10px 0 0; font-size:16px; opacity:.95; }

.wrap{ max-width:800px; margin:auto; padding:20px; }

.card{
background:var(--card);
border-radius:var(--radius);
padding:24px;
margin-bottom:18px;
box-shadow:var(--shadow);
}

.status-card { text-align: center; transition: 0.3s; border: 2px solid transparent; }
.status-card.is-closed { background: #fff1f1; border-color: var(--red); }
.status-card.is-open { background: #f1fff4; border-color: var(--green); }

.big{ font-size:42px; font-weight:900; line-height: 1.2; }
h2 { font-size: 20px; color: var(--green); margin-top: 0; margin-bottom: 15px; border-left: 5px solid var(--green); padding-left: 12px; }

table{ width:100%; border-collapse:collapse; }
th,td{ padding:14px 10px; border-bottom:1px solid var(--line); text-align:center; }
th{ background:#f8faf8; font-weight:900; color: var(--gray); }
.weekend { background: rgba(211, 51, 51, 0.03); color: var(--red); }

.note{ line-height:1.9; color:#444; font-size: 15px; }

.btns{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top: 10px; }
.btn{
display:flex; align-items:center; justify-content:center;
text-decoration:none; padding:16px; border-radius:18px;
background:var(--green); color:#fff; font-size:18px; font-weight:900;
}
.btn.gray{ background:var(--gray); }
.btn:active{ transform:scale(0.95); opacity:0.9; }

.red{ color:var(--red); }
.green{ color:var(--green); }

@media(max-width:480px){
    header h1{ font-size:26px; }
    .big{ font-size:32px; }
    .btns{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>
    <h1>後慈湖 營運資訊</h1>
    <p>開園公告與順延休園說明</p>
</header>

<div class="wrap">

    <div class="card status-card" id="statusBox">
        <div class="big" id="todayStatus">讀取中...</div>
    </div>

    <div class="card">
        <h2>本週營運概況</h2>
        <table id="weekTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>星期</th>
                    <th>營運狀態</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>最新公告 Notice</h2>
        <div class="note">
            📍 <b>固定休園日</b>：每週二休園。<br>
            📍 <b>連假順延規則</b>：若週二遇國定連假則照常開園，並順延至次日補休。<br>
            📍 現場候補僅依當日釋出名額進行，不保證一定有位。<br>
        </div>
    </div>

    <div class="card">
        <div class="btns">
            <a class="btn" href="visitor.html">返回首頁</a>
            <a class="btn gray" href="checkin.html">現場候補登記</a>
        </div>
    </div>

</div>

<footer>Houcihu Visitor Service Center &copy; 2026</footer>

<script>

// =======================
// 後慈湖 Calendar v11 修正版
// 週二固定休園
// 若週二連假 → 週三補休
// 若週二、週三連假 → 週四補休
// =======================

// 可自行新增國定連假日期
const holidayDates = [
"2026/01/27",
"2026/01/28",
"2026/02/24",
"2026/04/28"
];

const dayNames = [
"日","一","二","三","四","五","六"
];

// 日期格式
function formatDate(d){

const y=d.getFullYear();
const m=("0"+(d.getMonth()+1)).slice(-2);
const day=("0"+d.getDate()).slice(-2);

return `${y}/${m}/${day}`;

}

// 短日期
function shortDate(d){
return (d.getMonth()+1)+"/"+d.getDate();
}

// =======================
// 判斷休園
// =======================
function isHolidayClose(d){

const day = d.getDay();
const dateStr = formatDate(d);

// 一般週二休園（非連假）
if(
day===2 &&
!holidayDates.includes(dateStr)
){
return true;
}

// ------------------
// 週三補休
// ------------------
if(day===3){

const tue = new Date(d);
tue.setDate(d.getDate()-1);

const tueStr = formatDate(tue);

if(
holidayDates.includes(tueStr) &&
!holidayDates.includes(dateStr)
){
return true;
}

}

// ------------------
// 週四補休
// ------------------
if(day===4){

const tue = new Date(d);
tue.setDate(d.getDate()-2);

const wed = new Date(d);
wed.setDate(d.getDate()-1);

const tueStr = formatDate(tue);
const wedStr = formatDate(wed);

if(
holidayDates.includes(tueStr) &&
holidayDates.includes(wedStr)
){
return true;
}

}

return false;

}

// =======================
// 下次休園日
// =======================
function getNextClose(){

const d = new Date();

for(let i=0;i<60;i++){

const t = new Date();
t.setDate(d.getDate()+i);

if(isHolidayClose(t)){
return t;
}

}

return null;

}

// =======================
// 畫面渲染
// =======================
function renderCalendar(){

const now = new Date();

const statusBox =
document.getElementById("statusBox");

const todayStatus =
document.getElementById("todayStatus");

const nextClose =
document.getElementById("nextClose");

const tbody =
document.querySelector("#weekTable tbody");

// 今日狀態
const closed =
isHolidayClose(now);

statusBox.className =
"card status-card " +
(closed ? "status-close":"status-open");

if(closed){

let reason="每週二固定休園";

if(now.getDay()===3){
reason="遇連假順延補休";
}

if(now.getDay()===4){
reason="連假延長順延補休";
}

todayStatus.innerHTML =
`<span class="red">
今日休園<br>
<span style="font-size:16px;">
${reason}
</span>
</span>`;

}else{

todayStatus.innerHTML =
`<span class="green">
今日正常開園
</span>`;

}

// 下次休園日
const next = getNextClose();

nextClose.innerHTML =
next ?
`${shortDate(next)}（週${dayNames[next.getDay()]}）`
:
"暫無資料";

// 本週表格
let html="";

for(let i=0;i<7;i++){

const d = new Date();
d.setDate(now.getDate()+i);

const dayIdx=d.getDay();

const off=isHolidayClose(d);

html += `
<tr class="${
(dayIdx===0||dayIdx===6)
? 'weekend':''
}">
<td>${shortDate(d)}</td>
<td>週${dayNames[dayIdx]}</td>
<td class="${
off?'red':'green'
}">
<b>${
off?'休園':'正常開園'
}</b>
</td>
</tr>
`;

}

tbody.innerHTML=html;

}

renderCalendar();

</script>
            </tr>
        `;
    }
    tableBody.innerHTML = html;
}

renderCalendar();
</script>

</body>
</html>
