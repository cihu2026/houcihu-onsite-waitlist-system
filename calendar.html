<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜營運資訊</title>

<style>
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--blue:#2c69c9;
--gray:#666;
--orange:#d98b00;
--red:#d33;
--bg1:#eef6ef;
--bg2:#dfeee2;
--card:#ffffff;
--text:#1f2d1f;
--muted:#666;
--line:#e9ece9;
--shadow:0 12px 28px rgba(0,0,0,.08);
--radius:24px;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
background-attachment: fixed;
color:var(--text);
line-height:1.5;
}

header{
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
text-align:center;
padding:42px 20px;
}

header h1{ margin:0; font-size:32px; font-weight:900; }
header p{ margin:10px 0 0; font-size:16px; opacity:.95; }

.wrap{ max-width:800px; margin:auto; padding:20px; }

.card{
background:var(--card);
border-radius:var(--radius);
padding:24px;
margin-bottom:18px;
box-shadow:var(--shadow);
}

.status-card { text-align: center; transition: 0.3s; border: 2px solid transparent; }
.status-card.is-closed { background: #fff1f1; border-color: var(--red); }
.status-card.is-open { background: #f1fff4; border-color: var(--green); }

.big{ font-size:42px; font-weight:900; line-height: 1.2; }
h2 { font-size: 20px; color: var(--green); margin-top: 0; margin-bottom: 15px; border-left: 5px solid var(--green); padding-left: 12px; }

table{ width:100%; border-collapse:collapse; }
th,td{ padding:14px 10px; border-bottom:1px solid var(--line); text-align:center; }
th{ background:#f8faf8; font-weight:900; color: var(--gray); }
.weekend { background: rgba(211, 51, 51, 0.03); color: var(--red); }

.note{ line-height:1.9; color:#444; font-size: 15px; }

.btns{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top: 10px; }
.btn{
display:flex; align-items:center; justify-content:center;
text-decoration:none; padding:16px; border-radius:18px;
background:var(--green); color:#fff; font-size:18px; font-weight:900;
}
.btn.gray{ background:var(--gray); }
.btn:active{ transform:scale(0.95); opacity:0.9; }

.red{ color:var(--red); }
.green{ color:var(--green); }

@media(max-width:480px){
    header h1{ font-size:26px; }
    .big{ font-size:32px; }
    .btns{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>
    <h1>後慈湖 營運資訊</h1>
    <p>開園公告與順延休園說明</p>
</header>

<div class="wrap">

    <div class="card status-card" id="statusBox">
        <div class="big" id="todayStatus">讀取中...</div>
    </div>

    <div class="card">
        <h2>本週營運概況</h2>
        <table id="weekTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>星期</th>
                    <th>營運狀態</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>最新公告 Notice</h2>
        <div class="note">
            📍 <b>固定休園日</b>：每週二休園。<br>
            📍 <b>連假順延規則</b>：若週二遇國定連假則照常開園，並順延至週三補休。<br>
            📍 現場候補僅依當日釋出名額進行，不保證一定有位。<br>
        </div>
    </div>

    <div class="card">
        <div class="btns">
            <a class="btn" href="visitor.html">返回首頁</a>
            <a class="btn gray" href="checkin.html">現場候補登記</a>
        </div>
    </div>

</div>

<footer>Houcihu Visitor Service Center &copy; 2026</footer>

<script>
// --- 設定區：請填入遇連假的週二日期 ---
const holidayTuesdays = [
    "2026/1/27", // 農曆春節範例
    "2026/2/24", 
    "2026/4/28"  // 測試：假設今天 4/28 週二是連假
];

const dayNames = ["日","一","二","三","四","五","六"];

function isHolidayClose(d){
    const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    const day = d.getDay();

    // 1. 如果是週二，但在連假清單內 -> 開園
    if (day === 2 && holidayTuesdays.includes(dateStr)) return false;

    // 2. 如果是週三，且昨天(週二)是連假 -> 補休休園
    const yesterday = new Date(d);
    yesterday.setDate(d.getDate() - 1);
    const yesterdayStr = `${yesterday.getFullYear()}/${yesterday.getMonth()+1}/${yesterday.getDate()}`;
    if (day === 3 && holidayTuesdays.includes(yesterdayStr)) return true;

    // 3. 一般週二 -> 休園
    if (day === 2) return true;

    return false;
}

function renderCalendar(){
    const now = new Date();
    const statusBox = document.getElementById("statusBox");
    const todayStatus = document.getElementById("todayStatus");
    const tableBody = document.querySelector("#weekTable tbody");

    // 渲染今日
    const todayClosed = isHolidayClose(now);
    statusBox.className = `card status-card ${todayClosed ? 'is-closed' : 'is-open'}`;
    
    if(todayClosed){
        const isWed = now.getDay() === 3;
        todayStatus.innerHTML = `<span class="red">今日休園<br><small style="font-size:16px;">${isWed ? '遇連假順延補休' : '每週二固定休園'}</small></span>`;
    } else {
        todayStatus.innerHTML = '<span class="green">今日正常開園</span>';
    }

    // 渲染一週
    let html = "";
    for(let i=0; i<7; i++){
        const d = new Date();
        d.setDate(now.getDate() + i);
        const dayIdx = d.getDay();
        const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
        const closed = isHolidayClose(d);
        const isWeekend = (dayIdx === 0 || dayIdx === 6);

        html += `
            <tr class="${isWeekend ? 'weekend' : ''}">
                <td>${dateStr}</td>
                <td>週${dayNames[dayIdx]}</td>
                <td class="${closed ? 'red' : 'green'}"><b>${closed ? '休園' : '正常開園'}</b></td>
            </tr>
        `;
    }
    tableBody.innerHTML = html;
}

renderCalendar();
</script>

</body>
</html>
