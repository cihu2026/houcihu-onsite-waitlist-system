<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜營運資訊 v3</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
  background:linear-gradient(135deg,#eef6ef,#dfeee2);
  color:#1f2d1f;
}

header{
  background:linear-gradient(135deg,#1f5f35,#3e8b55);
  color:#fff;
  text-align:center;
  padding:28px 18px;
}

header h1{
  margin:0;
  font-size:32px;
}

header p{
  margin:10px 0 0;
  opacity:.95;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.big{
  font-size:46px;
  font-weight:900;
  text-align:center;
  color:#1f7a3f;
}

.red{ color:#d33; }

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th{
  background:#f7faf7;
}

.note{
  line-height:1.8;
  color:#444;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px;
  background:#1f7a3f;
  color:#fff;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

.gray{
  background:#666;
}

footer{
  text-align:center;
  color:#666;
  padding:10px 0 30px;
}

@media(max-width:768px){

  .big{font-size:34px;}

  .btns{
    grid-template-columns:1fr;
  }

  button{
    font-size:17px;
  }
}
</style>
</head>

<body>

<header>
<h1>後慈湖 營運資訊</h1>
<p>開園資訊｜休園公告｜現場服務</p>
</header>

<div class="wrap">

<!-- 今日 -->
<div class="card">
<div class="big" id="todayStatus">
讀取中...
</div>
</div>

<!-- 本週 -->
<div class="card">

<h2>本週營運資訊</h2>

<table id="weekTable">
<tr>
<th>日期</th>
<th>星期</th>
<th>狀態</th>
</tr>
</table>

</div>

<!-- 公告 -->
<div class="card">

<h2>最新公告</h2>

<div class="note">
1. 每週二固定休園。<br>
2. 如遇國定假日或連續假期，照常開園，順延次日休園。<br>
3. 現場候補依名額及順序遞補，不保證入場。
</div>

</div>

<!-- 快速入口 -->
<div class="card">

<h2>快速服務</h2>

<div class="btns">

<button onclick="location.href='checkin.html'">
現場候補登記
</button>

<button class="gray"
onclick="location.href='screen.html'">
查看即時叫號
</button>

</div>

</div>

</div>

<footer>
Houcihu Visitor Service Center
</footer>

<script>
// =====================================
// 台灣假日（可自行增修）
// 自動判斷用
// =====================================
const holidays = [
"2026-01-01",
"2026-02-16",
"2026-02-17",
"2026-02-18",
"2026-02-19",
"2026-02-20",
"2026-02-27",
"2026-02-28",
"2026-04-03",
"2026-04-04",
"2026-05-01",
"2026-06-19",
"2026-09-25",
"2026-10-09",
"2026-10-10"
];

const dayNames = [
"日","一","二","三","四","五","六"
];

// =====================================
function formatDate(d){

const y = d.getFullYear();
const m = String(d.getMonth()+1).padStart(2,"0");
const day = String(d.getDate()).padStart(2,"0");

return `${y}-${m}-${day}`;
}

function shortDate(d){
return (d.getMonth()+1)+"/"+d.getDate();
}

function isHoliday(d){
return holidays.includes(formatDate(d));
}

// =====================================
// 判斷狀態
// =====================================
function getStatus(d){

const week = d.getDay();
const key = formatDate(d);

// 若今天是假日 → 開園
if(isHoliday(d)){
  return "正常開園";
}

// 若今天是週三，昨天週二是假日
if(week === 3){

const y = new Date(d);
y.setDate(d.getDate()-1);

if(y.getDay() === 2 && isHoliday(y)){
  return "順延休園";
}
}

// 固定週二休園
if(week === 2){
  return "固定休園";
}

return "正常開園";
}

// =====================================
function renderCalendar(){

const now = new Date();

const today = getStatus(now);

const box =
document.getElementById("todayStatus");

if(today.includes("休園")){
box.innerHTML =
'<span class="red">今日' + today + '</span>';
}else{
box.innerText =
"今日正常開園";
}

const table =
document.getElementById("weekTable");

for(let i=0;i<7;i++){

const d = new Date();
d.setDate(now.getDate()+i);

table.innerHTML += `
<tr>
<td>${shortDate(d)}</td>
<td>週${dayNames[d.getDay()]}</td>
<td>${getStatus(d)}</td>
</tr>
`;
}

}

renderCalendar();
</script>

</body>
</html>
