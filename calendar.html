<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#155f34">
<title>後慈湖｜營運資訊</title>
<link rel="stylesheet" href="theme.css?v=14">
</head>
<body>
<header class="hero">
  <div class="hero__kicker">OPERATION CALENDAR</div>
  <h1>營運資訊</h1>
  <p>開園狀態、休園日、本週概況與本月營運月曆。</p>
</header>

<main class="wrap">
  <section class="card">
    <div class="big-number" id="todayStatus" style="font-size:clamp(42px,9vw,86px)">讀取中</div>
    <div class="sub" id="todayDate">今日狀態</div>
  </section>

  <section class="grid two">
    <div class="card kpi">
      <span>下次休園日</span>
      <b id="nextClose" class="grayText">讀取中</b>
      <small>依公告與連假調整</small>
    </div>
    <div class="card kpi">
      <span>固定規則</span>
      <b class="greenText" style="font-size:30px">週二休園</b>
      <small>國定連假遇週二則順延補休</small>
    </div>
  </section>

  <section class="card">
    <div class="section-title">
      <h2>本月營運月曆</h2>
      <span class="muted" id="monthName"></span>
    </div>
    <div class="calendar" id="calendarBox"></div>
  </section>

  <section class="card">
    <div class="section-title"><h2>本週營運概況</h2></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>日期</th><th>星期</th><th>狀態</th></tr></thead>
        <tbody id="weekTable"></tbody>
      </table>
    </div>
  </section>

  <section class="card notice">
    📍 每週二固定休園。若週二遇國定連假照常開園，補休日依公告順延。現場候補依當日實際名額安排。
  </section>

  <section class="card">
    <div class="grid two">
      <a class="btn block" href="visitor.html">返回首頁</a>
      <a class="btn block gray" href="checkin.html">現場候補登記</a>
    </div>
  </section>
</main>

<footer class="footer">Houcihu Visitor Service Center ｜ Official Calendar v14</footer>
<script>
const holidayDates = [
  "2026/01/27",
  "2026/01/28",
  "2026/02/24"
];
const dayNames = ["日","一","二","三","四","五","六"];
function formatDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}/${m}/${day}`;
}
function shortDate(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
function isHolidayClose(d){
  const day = d.getDay();
  const dateStr = formatDate(d);
  if(day === 2 && !holidayDates.includes(dateStr)) return true;
  if(day === 3){
    const tue = new Date(d);
    tue.setDate(d.getDate()-1);
    if(holidayDates.includes(formatDate(tue)) && !holidayDates.includes(dateStr)) return true;
  }
  if(day === 4){
    const tue = new Date(d);
    tue.setDate(d.getDate()-2);
    const wed = new Date(d);
    wed.setDate(d.getDate()-1);
    if(holidayDates.includes(formatDate(tue)) && holidayDates.includes(formatDate(wed))) return true;
  }
  return false;
}
function getNextClose(){
  for(let i = 0; i < 90; i++){
    const d = new Date();
    d.setDate(d.getDate()+i);
    if(isHolidayClose(d)) return d;
  }
  return null;
}
function renderMonth(){
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  document.getElementById("monthName").innerText = `${y} 年 ${m+1} 月`;
  const box = document.getElementById("calendarBox");
  let html = dayNames.map(name => `<div class="dayname">${name}</div>`).join("");
  const first = new Date(y,m,1).getDay();
  const last = new Date(y,m+1,0).getDate();
  for(let i = 0; i < first; i++) html += `<div></div>`;
  for(let d = 1; d <= last; d++){
    const date = new Date(y,m,d);
    const closed = isHolidayClose(date);
    const today = d === now.getDate() && m === now.getMonth() && y === now.getFullYear();
    html += `<div class="day ${today ? "today" : ""} ${closed ? "close" : ""}"><div>${d}</div><div class="note">${closed ? "休園" : "開園"}</div></div>`;
  }
  box.innerHTML = html;
}
function renderWeek(){
  const now = new Date();
  let html = "";
  for(let i = 0; i < 7; i++){
    const d = new Date();
    d.setDate(now.getDate()+i);
    const closed = isHolidayClose(d);
    html += `<tr><td>${shortDate(d)}</td><td>週${dayNames[d.getDay()]}</td><td class="${closed ? "redText" : "greenText"}"><b>${closed ? "休園" : "正常開園"}</b></td></tr>`;
  }
  document.getElementById("weekTable").innerHTML = html;
}
function render(){
  const now = new Date();
  const closed = isHolidayClose(now);
  document.getElementById("todayStatus").innerHTML = closed ? `<span class="redText">今日休園</span>` : `<span class="greenText">今日開園</span>`;
  document.getElementById("todayDate").innerText = `${formatDate(now)}（週${dayNames[now.getDay()]}）`;
  const next = getNextClose();
  document.getElementById("nextClose").innerText = next ? `${shortDate(next)}（週${dayNames[next.getDay()]}）` : "暫無資料";
  renderMonth();
  renderWeek();
}
render();
</script>
</body>
</html>
