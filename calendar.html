<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜營運資訊</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
  background:linear-gradient(135deg,#eef6ef,#dfeee2);
  color:#1f2d1f;
}

header{
  background:linear-gradient(135deg,#1f5f35,#3e8b55);
  color:#fff;
  text-align:center;
  padding:28px 18px;
}

header h1{
  margin:0;
  font-size:32px;
}

header p{
  margin:10px 0 0;
  opacity:.95;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.big{
  font-size:48px;
  font-weight:900;
  text-align:center;
  color:#1f7a3f;
}

.red{
  color:#d33;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th{
  background:#f7faf7;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px;
  background:#1f7a3f;
  color:#fff;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

.gray{
  background:#666;
}

.note{
  line-height:1.8;
  color:#444;
}

footer{
  text-align:center;
  color:#666;
  padding:10px 0 30px;
}

@media(max-width:768px){

  .big{
    font-size:36px;
  }

  .btns{
    grid-template-columns:1fr;
  }

  button{
    font-size:17px;
  }
}
</style>
</head>

<body>

<header>
<h1>後慈湖 營運資訊</h1>
<p>開園資訊｜休園公告｜現場服務</p>
</header>

<div class="wrap">

<!-- 今日狀態 -->
<div class="card">
<div class="big" id="todayStatus">
讀取中...
</div>
</div>

<!-- 本週資訊 -->
<div class="card">

<h2>本週營運資訊</h2>

<table id="weekTable">
<tr>
<th>日期</th>
<th>星期</th>
<th>狀態</th>
</tr>
</table>

</div>

<!-- 最新公告 -->
<div class="card">

<h2>最新公告</h2>

<div class="note">
1. 每週二固定休園（如遇連假依官方公告調整）。<br>
2. 現場候補依名額及順序遞補，不保證入場。<br>
3. 請依現場工作人員引導辦理。
</div>

</div>

<!-- 快速入口 -->
<div class="card">

<h2>快速服務</h2>

<div class="btns">

<button onclick="location.href='checkin.html'">
現場候補登記
</button>

<button class="gray"
onclick="location.href='screen.html'">
查看即時叫號
</button>

</div>

</div>

</div>

<footer>
Houcihu Visitor Service Center
</footer>

<script>
// =============================
// 今日狀態
// =============================
const dayNames = [
"日","一","二","三","四","五","六"
];

function formatDate(d){

const m = d.getMonth()+1;
const day = d.getDate();

return m + "/" + day;
}

function renderCalendar(){

const now = new Date();

const today = now.getDay();

// 週二休園
if(today === 2){

document.getElementById("todayStatus")
.innerHTML =
'<span class="red">今日休園（週二固定休園）</span>';

}else{

document.getElementById("todayStatus")
.innerText =
"今日正常開園";

}

// 本週表格
const table =
document.getElementById("weekTable");

for(let i=0;i<7;i++){

const d = new Date();
d.setDate(now.getDate()+i);

const week = d.getDay();

let status =
week === 2 ?
"休園" :
"正常開園";

table.innerHTML += `
<tr>
<td>${formatDate(d)}</td>
<td>週${dayNames[week]}</td>
<td>${status}</td>
</tr>
`;
}

}

renderCalendar();
</script>

</body>
</html>
