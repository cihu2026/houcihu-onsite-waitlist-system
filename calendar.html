<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Abby Luo">
<title>後慈湖｜營運資訊</title>
<link rel="stylesheet" href="style.css">

<style>
.red{color:#d33;font-weight:900;}
.orange{color:#d98b00;font-weight:900;}
.green{color:#1f7a3f;font-weight:900;}
.gray{color:#888;font-weight:900;}

.big{
font-size:42px;
font-weight:900;
text-align:center;
}

.note{
line-height:1.9;
color:#444;
}

.btns{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

@media(max-width:768px){

.big{font-size:34px;}

.btns{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<header class="hero">
<h1>後慈湖 營運資訊</h1>
<p>開園資訊｜休園公告｜現場服務</p>
</header>

<div class="wrap">

<!-- 今日狀態 -->
<div class="card">

<div class="big" id="todayStatus">
讀取中...
</div>

</div>

<!-- 本週資訊 -->
<div class="card">

<h2>本週營運資訊</h2>

<table id="weekTable">

<tr>
<th>日期</th>
<th>星期</th>
<th>狀態</th>
</tr>

</table>

</div>

<!-- 公告 -->
<div class="card">

<h2>最新公告</h2>

<div class="note">
1. 每週二固定休園（如遇連假依官方公告調整）。<br>
2. 現場候補依名額及順序遞補，不保證入場。<br>
3. 請依現場工作人員引導辦理。<br>
4. 開放梯次與入園時間依現場公告為準。
</div>

</div>

<!-- 快速入口 -->
<div class="card">

<h2>快速服務</h2>

<div class="btns">

<a class="btn"
href="visitor.html">
返回首頁
</a>

<a class="btn gray"
href="checkin.html">
現場候補登記
</a>

</div>

</div>

</div>

<footer>
Houcihu Visitor Service Center
</footer>

<script>
const dayNames = [
"日","一","二","三","四","五","六"
];

function formatDate(d){

const y = d.getFullYear();
const m = d.getMonth()+1;
const day = d.getDate();

return y + "/" + m + "/" + day;

}

// 固定週二休園
function isClose(d){

return d.getDay()===2;

}

function renderPage(){

const now = new Date();

const today =
document.getElementById(
"todayStatus"
);

// 今日狀態
if(isClose(now)){

today.innerHTML =
'<span class="red">休園</span>';

}else{

today.innerHTML =
'<span class="green">正常開園</span>';

}

// 本週資訊
const table =
document.getElementById(
"weekTable"
);

for(let i=0;i<7;i++){

const d = new Date();

d.setDate(
now.getDate()+i
);

const week =
d.getDay();

let text="";
let cls="green";

if(isClose(d)){

text="休園";
cls="red";

}else{

text="正常開園";

}

table.innerHTML += `
<tr>
<td>${formatDate(d)}</td>
<td>週${dayNames[week]}</td>
<td class="${cls}">
${text}
</td>
</tr>
`;

}

}

renderPage();
</script>

</body>
</html>
