<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Abby Luo">
<meta name="generator" content="Houcihu Calendar v9">
<title>後慈湖｜營運資訊</title>
<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,#eef6ef,#dfeee2);
color:#1f2d1f;
}

header{
background:linear-gradient(135deg,#1f5f35,#3e8b55);
color:#fff;
text-align:center;
padding:32px 18px;
}

header h1{
margin:0;
font-size:34px;
font-weight:900;
}

header p{
margin:10px 0 0;
font-size:17px;
opacity:.95;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.big{
font-size:42px;
font-weight:900;
text-align:center;
color:#1f7a3f;
}

.red{color:#d33;}
.orange{color:#d98b00;}
.green{color:#1f7a3f;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
font-size:15px;
}

th{
background:#f7faf7;
}

.note{
line-height:1.9;
color:#444;
}

.btns{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

a.btn{
display:block;
text-decoration:none;
text-align:center;
padding:16px;
border-radius:16px;
background:#1f7a3f;
color:#fff;
font-size:18px;
font-weight:900;
}

a.graybtn{
background:#666;
}

footer{
text-align:center;
color:#666;
padding:10px 0 30px;
}

@media(max-width:768px){

header h1{
font-size:28px;
}

.big{
font-size:34px;
}

th,td{
font-size:13px;
padding:8px;
}

.btns{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<header>
<h1>後慈湖 營運資訊</h1>
<p>開園資訊｜休園公告｜現場服務</p>
</header>

<div class="wrap">

<div class="card">
<div class="big" id="todayStatus">
讀取中...
</div>
</div>

<div class="card">

<h2>本週營運資訊</h2>

<table id="weekTable">

<tr>
<th>日期</th>
<th>星期</th>
<th>狀態</th>
</tr>

</table>

</div>

<div class="card">

<h2>最新公告</h2>

<div class="note">
1. 每週二固定休園（如遇連假依官方公告調整）。<br>
2. 現場候補依名額及順序遞補，不保證入場。<br>
3. 請依現場工作人員引導辦理。<br>
4. 開放梯次與入園時間依現場公告為準。
</div>

</div>

<div class="card">

<h2>快速服務</h2>

<div class="btns">

<a class="btn"
href="visitor.html">
返回首頁
</a>

<a class="btn graybtn"
href="checkin.html">
現場候補登記
</a>

</div>

</div>

</div>

<footer>
Houcihu Visitor Service Center
</footer>

<script>
const dayNames = [
"日","一","二","三","四","五","六"
];

function formatDate(d){

const y = d.getFullYear();
const m = d.getMonth()+1;
const day = d.getDate();

return y + "/" + m + "/" + day;

}

function isHolidayClose(d){

if(d.getDay()===2){
return true;
}

return false;

}

function renderCalendar(){

const now = new Date();

const today =
document.getElementById(
"todayStatus"
);

if(isHolidayClose(now)){

today.innerHTML =
'<span class="red">今日休園</span>';

}else{

today.innerHTML =
'<span class="green">今日正常開園</span>';

}

const table =
document.getElementById(
"weekTable"
);

for(let i=0;i<7;i++){

const d = new Date();

d.setDate(
now.getDate()+i
);

const week =
d.getDay();

let text="";
let cls="green";

if(isHolidayClose(d)){

text="休園";
cls="red";

}else{

text="正常開園";

}

table.innerHTML += `
<tr>
<td>${formatDate(d)}</td>
<td>週${dayNames[week]}</td>
<td class="${cls}">
${text}
</td>
</tr>
`;

}

}

renderCalendar();
</script>

</body>
</html>
