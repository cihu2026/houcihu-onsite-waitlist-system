<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#155f34">
<title>後慈湖｜即時梯次資訊</title>
<link rel="stylesheet" href="theme.css?v=14">
</head>
<body>
<header class="hero"><div class="hero__kicker">LIVE STATUS</div><h1>即時梯次資訊</h1><p>名額現況、目前叫號與候補服務同步顯示。</p></header>
<main class="wrap narrow">
  <section class="card"><div class="sub">目前叫號</div><div class="big-number" id="currentNo">A000</div><div class="sub" id="syncTime">資料同步中</div></section>
  <section class="card"><div class="kpi" style="min-height:auto;text-align:center"><span>今日開放梯次</span><b id="todayText" class="greenText" style="font-size:30px">載入中</b><small>依現場公告及實際名額為準</small></div></section>
  <section class="card"><div class="section-title"><h2>今日梯次狀況</h2></div><div class="grid auto" id="slotGrid">載入中...</div></section>
  <section class="card notice">現場遞補不代表一定有名額。實際入場資格依現場名額與工作人員安排為準。</section>
  <section class="card"><div class="grid two"><a class="btn block" href="checkin.html">現場候補登記</a><a class="btn block gray" href="visitor.html">返回首頁</a></div></section>
</main>
<footer class="footer">Houcihu Visitor Service Center © 2026</footer>
<script src="sheets.js?v=14.4"></script>
<script>
function setTodayText(){ const now = new Date(); const limit = new Date("2026-06-21T00:00:00+08:00"); document.getElementById("todayText").innerText = now < limit ? "第 1、3、5、7 梯" : "第 1 至 8 梯"; }
function getSessionCap(row){ const v = String(row?.[3] ?? "").trim(); return v !== "" ? Number(v || 0) : Number(row?.[2] || 0); }
function renderCurrent(current){
  const el = document.getElementById("currentNo");
  const no = current || "A000";
  if(el.innerText !== no){ el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash"); }
  el.innerText = no;
}
function renderSlots(sessions){
  const box = document.getElementById("slotGrid");
  if(!sessions || sessions.length <= 1){ box.innerHTML = `<div class="muted">尚無梯次資料</div>`; return; }
  let html = "";
  for(let i = 1; i < sessions.length; i++){
    const no = sessions[i][0]; const open = isOpenFlag(sessions[i][1]); const cap = getSessionCap(sessions[i]);
    let text = "未開放"; let cls = "grayText";
    if(open && cap <= 0){ text = "額滿"; cls = "redText"; }
    else if(open && cap <= 3){ text = `剩 ${cap} 位`; cls = "orangeText"; }
    else if(open){ text = `可遞補 ${cap} 位`; cls = "greenText"; }
    html += `<div class="slot-card"><h3>第 ${no} 梯</h3><div class="state ${cls}">${text}</div></div>`;
  }
  box.innerHTML = html;
}
async function refreshDisplay(){
  try{
    const data = await getPublicStatus();
    renderCurrent(data.currentNo);
    renderSlots(data.sessions);
    document.getElementById("syncTime").innerText = data.ok ? "最後同步 " + formatLocalTime() : "等待後端隱私版部署";
  }catch(error){ console.warn(error); document.getElementById("syncTime").innerText = "連線中斷"; }
}
setTodayText(); refreshDisplay(); autoSync(refreshDisplay,5000);
</script>
</body>
</html>
