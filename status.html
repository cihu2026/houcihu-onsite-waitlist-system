<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜即時梯次資訊</title>

<style>
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--gray:#666;
--orange:#d98b00;
--red:#d33;
--bg1:#eef6ef;
--bg2:#dfeee2;
--card:#fff;
--text:#1f2d1f;
--line:#e9ece9;
--shadow:0 12px 28px rgba(0,0,0,.08);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
}

header{
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
text-align:center;
padding:24px 16px;
}

header h1{
margin:0;
font-size:28px;
font-weight:900;
}

header p{
margin:8px 0 0;
font-size:15px;
opacity:.95;
}

.wrap{
max-width:900px;
margin:auto;
padding:14px;
}

.card{
background:#fff;
border-radius:22px;
padding:18px;
margin-bottom:14px;
box-shadow:var(--shadow);
}

.big{
font-size:68px;
font-weight:900;
text-align:center;
color:var(--green);
line-height:1;
}

.sub{
text-align:center;
font-size:15px;
color:#666;
margin-top:8px;
}

.today{
font-size:18px;
font-weight:900;
text-align:center;
color:var(--green2);
background:#f4fbf4;
padding:14px;
border-radius:16px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.slot{
border:1px solid var(--line);
border-radius:18px;
padding:16px;
text-align:center;
background:#fcfffc;
}

.slot h3{
margin:0 0 8px;
font-size:22px;
font-weight:900;
}

.state{
font-size:24px;
font-weight:900;
}

.green{color:var(--green);}
.orange{color:var(--orange);}
.red{color:var(--red);}
.gray{color:#888;}

.notice{
background:#fff3cd;
border-left:6px solid #d6a400;
font-weight:800;
color:#8a6d3b;
line-height:1.8;
font-size:14px;
}

.btn{
display:block;
text-decoration:none;
text-align:center;
padding:16px;
border-radius:16px;
background:var(--green);
color:#fff;
font-size:18px;
font-weight:900;
margin-top:10px;
}

.btn.gray{
background:#666;
}

footer{
text-align:center;
font-size:13px;
color:#666;
padding:10px 0 22px;
}

@media(min-width:768px){
.big{font-size:110px;}
.grid{grid-template-columns:repeat(2,1fr);}
header h1{font-size:34px;}
}
</style>
</head>

<body>

<header>
<h1>後慈湖 即時梯次資訊</h1>
<p>名額現況｜即時叫號｜候補服務</p>
</header>

<div class="wrap">

<!-- 目前叫號 -->
<div class="card">
<div class="big" id="currentNo">A000</div>
<div class="sub">目前叫號 NOW CALLING</div>
</div>

<!-- 今日開放 -->
<div class="card">
<div class="today" id="todayText">載入中...</div>
</div>

<!-- 梯次 -->
<div class="card">
<h2 style="margin-top:0;color:var(--green);font-size:22px;">今日梯次狀況</h2>
<div class="grid" id="slotGrid">
載入中...
</div>
</div>

<!-- 公告 -->
<div class="card notice">
現場遞補不代表一定有名額。<br>
實際入場資格依現場名額與工作人員安排為準。
</div>

<!-- 快速按鈕 -->
<div class="card">
<a class="btn" href="checkin.html">現場候補登記</a>
<a class="btn gray" href="visitor.html">返回首頁</a>
</div>

</div>

<footer>
Houcihu Visitor Service Center © 2026
</footer>

<script src="sheets.js?v=11"></script>

<script>
function setTodayText(){

const now=new Date();
const limit=new Date("2026-06-21");

if(now<limit){
document.getElementById("todayText").innerText=
"今日開放第 1、3、5、7 梯";
}else{
document.getElementById("todayText").innerText=
"今日開放第 1 至 8 梯";
}

}

async function refreshDisplay(){

try{

const [rows,sessions]=await Promise.all([
cloudGet(),
getSessions()
]);

// 目前叫號
let current="A000";

if(rows && rows.length>1){

for(let i=rows.length-1;i>=1;i--){
if(rows[i][5]==="called"){
current=rows[i][0];
break;
}
}

}

document.getElementById("currentNo").innerText=current;

// 梯次
const box=document.getElementById("slotGrid");

let html="";

for(let i=1;i<sessions.length;i++){

const no=sessions[i][0];
const open=sessions[i][1];
const cap=Number(sessions[i][2]);

let text="",cls="gray";

if(!open){
text="未開放";
}
else if(cap<=0){
text="額滿";
cls="red";
}
else if(cap<=3){
text="剩 "+cap+" 位";
cls="orange";
}
else{
text="可遞補";
cls="green";
}

html+=`
<div class="slot">
<h3>第 ${no} 梯</h3>
<div class="state ${cls}">
${text}
</div>
</div>
`;

}

box.innerHTML=html;

}catch(e){
console.log(e);
}

}

async function init(){

setTodayText();
await refreshDisplay();

if(typeof autoSync==="function"){
autoSync(refreshDisplay,8000);
}

}

init();
</script>

</body>
</html>
