<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖｜即時梯次資訊</title>

<style>
/* 繼承 v10.1 Premium 全域樣式 */
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--blue:#2c69c9;
--gray:#666;
--orange:#d98b00;
--red:#d33;
--bg1:#eef6ef;
--bg2:#dfeee2;
--card:#ffffff;
--text:#1f2d1f;
--muted:#666;
--line:#e9ece9;
--shadow:0 12px 28px rgba(0,0,0,.08);
--shadow-hover:0 18px 34px rgba(0,0,0,.12);
--radius:24px;
--radius-sm:16px;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
background-attachment: fixed;
color:var(--text);
line-height:1.5;
}

header{
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
text-align:center;
padding:42px 20px;
box-shadow:0 8px 22px rgba(0,0,0,.08);
}

header h1{ margin:0; font-size:32px; font-weight:900; }
header p{ margin:10px 0 0; font-size:16px; opacity:.95; }

.wrap{ max-width:800px; margin:auto; padding:20px; }

.card{
background:var(--card);
border-radius:var(--radius);
padding:24px;
margin-bottom:18px;
box-shadow:var(--shadow);
}

.notice{
background:#fff3cd;
border-left:6px solid #d6a400;
font-weight:800;
color:#8a6d3b;
padding:15px;
font-size: 14px;
}

.big {
font-size: 48px;
font-weight: 900;
text-align: center;
color: var(--green);
margin: 10px 0;
}

.today-box {
font-size: 18px;
font-weight: bold;
text-align: center;
color: var(--green2);
background: rgba(31, 122, 63, 0.05);
padding: 15px;
border-radius: 14px;
}

.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 12px;
margin-top: 15px;
}

.slot {
border: 1px solid var(--line);
border-radius: var(--radius-sm);
padding: 15px;
text-align: center;
background: #fdfdfd;
}

.slot h3 { margin: 0 0 8px; font-size: 18px; color: var(--muted); }
.state { font-size: 20px; font-weight: 900; }

.green{ color: var(--green); }
.orange{ color: var(--orange); }
.red{ color: var(--red); }
.gray{ color: var(--gray); }

.btns {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-top: 15px;
}

.btn {
display: block;
text-decoration: none;
text-align: center;
padding: 16px;
border-radius: 16px;
background: var(--green);
color: #fff;
font-size: 18px;
font-weight: 900;
transition: transform 0.2s;
}

.btn.gray { background: var(--gray); }
.btn:active { transform: scale(0.96); }

footer { text-align: center; color: var(--muted); padding: 20px; font-size: 13px; }

@media(max-width:480px){
header h1{ font-size: 26px; }
.btns { grid-template-columns: 1fr; }
.big { font-size: 40px; }
}
</style>
</head>

<body>

<header>
<h1>後慈湖 即時梯次資訊</h1>
<p>即時名額現況與叫號進度</p>
</header>

<div class="wrap">

<div class="card">
<div class="today-box" id="todayText">載入資訊中...</div>
</div>

<div class="card">
<h2>今日梯次狀況</h2>
<div class="grid" id="slotGrid">載入中...</div>
</div>

<div class="card">
<h2 style="text-align:center;">目前叫號</h2>
<div class="big" id="currentNo">A000</div>
<p style="text-align:center; color:var(--muted); font-size:14px; margin-top: -10px;">
請持有此號碼前（含）之遊客至櫃檯報到
</p>
</div>

<div class="card notice">
⚠️ 現場遞補名額有限，請隨時留意本頁面資訊。實際名額依現場安排為準。
</div>

<div class="card">
<h2>快速服務</h2>
<div class="btns">
<a class="btn" href="checkin.html">現場候補登記</a>
<a class="btn gray" href="visitor.html">返回首頁</a>
</div>
</div>

</div>

<footer>
Houcihu Visitor Service Center &copy; 2026
</footer>

<script src="sheets.js?v=10.1"></script>
<script>
// --- 根據日期自動顯示今日開放梯次 ---
function setTodayText(){
    const now = new Date();
    // 這裡維持你原始的邏輯判斷
    const limit = new Date("2026-06-21");
    const target = document.getElementById("todayText");

    if(now < limit){
        target.innerText = "今日開放第 1、3、5、7 梯";
    } else {
        target.innerText = "今日開放第 1 至 8 梯";
    }
}

// --- 更新顯示邏輯 ---
async function refreshDisplay() {
    try {
        // 同時抓取名單與梯次，效率最高
        const [rows, sessions] = await Promise.all([
            cloudGet(),
            getSessions()
        ]);

        // 1. 更新目前叫號 (從後往前找最新的 called)
        let current = "A000";
        if (rows && rows.length > 1) {
            for (let i = rows.length - 1; i >= 1; i--) {
                if (rows[i][5] === "called") {
                    current = rows[i][0];
                    break;
                }
            }
        }
        document.getElementById("currentNo").innerText = current;

        // 2. 更新梯次狀況
        const box = document.getElementById("slotGrid");
        if (!sessions || sessions.length <= 1) return;

        let html = "";
        for (let i = 1; i < sessions.length; i++) {
            const [no, open, cap] = sessions[i];
            let text = "", cls = "gray";

            if (!open) {
                text = "未開放";
            } else if (Number(cap) <= 0) {
                text = "額滿";
                cls = "red";
            } else if (Number(cap) <= 3) {
                text = `剩 ${cap} 位`;
                cls = "orange";
            } else {
                text = "可遞補";
                cls = "green";
            }

            html += `
                <div class="slot">
                    <h3>第 ${no} 梯</h3>
                    <div class="state ${cls}">${text}</div>
                </div>
            `;
        }
        box.innerHTML = html;

    } catch (e) {
        console.error("即時資訊刷新錯誤:", e);
    }
}

// --- 初始化與自動更新 ---
async function init(){
    setTodayText();
    await refreshDisplay();

    // 使用 sheets.js 的 autoSync 機制，遊客頁面建議 5-8 秒刷新一次即可
    if(typeof autoSync === "function"){
        autoSync(refreshDisplay, 8000);
    }
}

init();
</script>

</body>
</html>
