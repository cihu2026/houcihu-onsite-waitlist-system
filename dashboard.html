<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#155f34">
<meta name="author" content="Abby Luo">
<title>後慈湖｜智慧營運儀表板</title>
<link rel="stylesheet" href="theme.css?v=14">
<style>
.dashboard-hero{padding:34px 16px 22px;text-align:center}.dashboard-hero h1{font-size:clamp(32px,7vw,54px);margin:0}.dashboard-hero p{color:rgba(255,255,255,.72);font-weight:800;line-height:1.7}.safe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.safe-card{border-radius:30px;padding:22px;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.18);box-shadow:0 18px 45px rgba(0,0,0,.18);text-align:center}.safe-card span{display:block;color:var(--muted);font-weight:900;letter-spacing:.08em}.safe-card b{display:block;margin-top:10px;font-size:clamp(36px,8vw,76px);line-height:1}.safe-card small{display:block;margin-top:10px;color:var(--muted);font-weight:800}.advice{font-size:20px;line-height:1.8;font-weight:900}.subnav{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}@media(max-width:760px){.safe-grid,.subnav{grid-template-columns:1fr}.safe-card{padding:18px}.advice{font-size:17px}}
</style>
</head>
<body>
<header class="hero dashboard-hero"><div class="hero__kicker">PUBLIC SAFE DASHBOARD</div><h1>後慈湖智慧營運儀表板</h1><p>公開頁只顯示叫號、等待組數與梯次資訊，不讀取姓名與電話。</p></header>
<main class="wrap">
  <section class="safe-grid">
    <div class="safe-card"><span>目前叫號</span><b id="currentNo" class="greenText">A000</b><small>公開看板同步</small></div>
    <div class="safe-card"><span>等待組數</span><b id="waitingCount" class="orangeText">0</b><small>現場候補壓力</small></div>
    <div class="safe-card"><span>營運模式</span><b id="modeText" class="blueText">讀取中</b><small id="syncTime">連線中</small></div>
  </section>

  <section class="card" style="margin-top:16px">
    <div class="section-title"><h2>系統建議</h2><span id="levelText" class="badge open">低</span></div>
    <div class="advice" id="actionText">載入中...</div>
  </section>

  <section class="card" style="margin-top:16px">
    <div class="section-title"><h2>快速入口</h2></div>
    <div class="subnav">
      <a class="btn block" href="checkin.html">📝 候補登記</a>
      <a class="btn block blue" href="status.html">📊 梯次資訊</a>
      <a class="btn block gray" href="screen.html">📢 叫號看板</a>
      <a class="btn block orange" href="admin-login.html">🔐 後台登入</a>
    </div>
  </section>
</main>
<footer class="footer">Houcihu Smart Operation Dashboard ｜ Public Safe v14.7</footer>
<script src="sheets.js?v=14.6"></script>
<script>
async function loadDashboard(){
  try{
    const data = await getPublicStatus();
    const waiting = Number(data.waitingCount || 0);
    const current = data.currentNo || "A000";
    document.getElementById("currentNo").innerText = current;
    document.getElementById("waitingCount").innerText = waiting;
    let mode="順暢";
    let level="低";
    let action="現場狀況穩定，可維持目前叫號節奏。";
    if(waiting >= 5){ mode="繁忙"; level="中"; action="候補量增加，建議工作人員加快確認報到與補位。"; }
    if(waiting >= 10){ mode="尖峰"; level="高"; action="候補壓力偏高，建議主管即時確認梯次名額與人力支援。"; }
    document.getElementById("modeText").innerText = mode;
    document.getElementById("levelText").innerText = level;
    document.getElementById("levelText").className = waiting >= 10 ? "badge closed" : waiting >= 5 ? "badge called" : "badge open";
    document.getElementById("actionText").innerText = action;
    document.getElementById("syncTime").innerText = data.ok ? "最後同步 " + formatLocalTime() : "等待後端部署";
  }catch(e){
    console.warn(e);
    document.getElementById("syncTime").innerText = "連線中斷";
  }
}
loadDashboard();
autoSync(loadDashboard,5000);
</script>
</body>
</html>
