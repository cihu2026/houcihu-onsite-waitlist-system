<!--
Houcihu Smart Operation Dashboard
v11 ENTERPRISE
手機版＋正式版
-->

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Abby Luo">
<title>後慈湖｜智慧儀表板</title>

<style>
:root{
--green:#1f7a3f;
--green2:#3e8b55;
--blue:#2c69c9;
--orange:#d98b00;
--red:#d33;
--gray:#666;
--bg1:#eef6ef;
--bg2:#dfeee2;
--card:#ffffff;
--text:#1f2d1f;
--shadow:0 12px 28px rgba(0,0,0,.08);
--radius:24px;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
}

header{
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
text-align:center;
padding:26px 16px;
}

header h1{
margin:0;
font-size:28px;
font-weight:900;
}

.wrap{
max-width:1100px;
margin:auto;
padding:14px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

.card{
background:#fff;
border-radius:24px;
padding:20px;
box-shadow:var(--shadow);
}

h2{
margin:0 0 14px;
font-size:22px;
color:var(--green);
}

.big{
font-size:58px;
font-weight:900;
text-align:center;
line-height:1;
margin:10px 0;
}

.green{color:var(--green);}
.orange{color:var(--orange);}
.red{color:var(--red);}
.blue{color:var(--blue);}
.gray{color:#666;}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid #eee;
font-size:18px;
font-weight:700;
}

.row:last-child{
border-bottom:none;
}

.tag{
font-size:28px;
font-weight:900;
}

.note{
font-size:15px;
line-height:1.8;
color:#444;
}

@media(min-width:768px){
.grid{
grid-template-columns:1fr 1fr;
}
header h1{
font-size:34px;
}
.big{
font-size:80px;
}
}
</style>
</head>

<body>

<header>
<h1>後慈湖 智慧營運儀表板</h1>
</header>

<div class="wrap">

<div class="grid">

<div class="card">
<h2>今日模式</h2>
<div class="big green" id="modeText">讀取中...</div>
<div class="note" id="suggestText">分析中...</div>
</div>

<div class="card">
<h2>即時狀況</h2>

<div class="row">
<span>目前叫號</span>
<span class="tag green" id="currentNo">A000</span>
</div>

<div class="row">
<span>等待組數</span>
<span class="tag blue" id="waitingCount">0</span>
</div>

<div class="row">
<span>候補壓力</span>
<span class="tag orange" id="levelText">低</span>
</div>

</div>

</div>

<div class="card">
<h2>系統建議</h2>
<div class="note" id="actionText">
載入中...
</div>
</div>

</div>

<script src="sheets.js?v=11"></script>

<script>
async function loadDashboard(){

try{

const rows = await cloudGet();

let current="A000";
let waiting=0;

if(rows && rows.length>1){

for(let i=rows.length-1;i>=1;i--){
if(rows[i][5]==="called"){
current=rows[i][0];
break;
}
}

for(let i=1;i<rows.length;i++){
if(rows[i][5]==="waiting") waiting++;
}

}

document.getElementById("currentNo").innerText=current;
document.getElementById("waitingCount").innerText=waiting;

// 判斷模式
let mode="順暢模式";
let level="低";
let suggest="現場狀況穩定，可正常作業。";
let action="建議維持現行梯次與叫號節奏。";

if(waiting>=5){
mode="繁忙模式";
level="中";
suggest="候補人數增加，建議加速叫號。";
action="建議每梯次提前確認報到狀況。";
}

if(waiting>=10){
mode="尖峰模式";
level="高";
suggest="候補量高，建議啟動加開梯次。";
action="建議主管即時調度人力與名額。";
}

document.getElementById("modeText").innerText=mode;
document.getElementById("levelText").innerText=level;
document.getElementById("suggestText").innerText=suggest;
document.getElementById("actionText").innerText=action;

}catch(e){
console.log(e);
}

}

loadDashboard();

if(typeof autoSync==="function"){
autoSync(loadDashboard,8000);
}
</script>

</body>
</html>
