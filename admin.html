<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖候補系統｜管理後台</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="admin">

<header class="topbar">
<h1>後慈湖候補系統</h1>
<div class="sub">管理後台</div>
</header>

<div class="wrap">

<div class="card">
<h2>新增候補</h2>
<input id="guestName" placeholder="姓名">
<input id="guestCount" type="number" value="1">
<input id="guestPhone" placeholder="手機末三碼">
<button class="btn primary" onclick="addGuest()">新增</button>
</div>

<div class="card">
<h2>控制台</h2>
<p>目前叫號：<span id="currentNo">A000</span></p>
<p>等待組數：<span id="waitingCount">0</span></p>

<button class="btn success" onclick="callNext()">下一號</button>
<button class="btn warning" onclick="markMissed()">過號</button>
<button class="btn done" onclick="markDone()">完成</button>
<button class="btn danger" onclick="resetToday()">清空今日</button>
</div>

<div class="card">
<h2>等待名單</h2>
<table class="table">
<thead>
<tr>
<th>號碼</th>
<th>姓名</th>
<th>人數</th>
<th>狀態</th>
</tr>
</thead>
<tbody id="queueTable"></tbody>
</table>
</div>

</div>

<script src="script.js"></script>
<script src="sheets.js"></script>
</body>
</html>
