<!-- admin.html -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>後慈湖候補系統 v2｜管理後台</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="admin">

<header class="topbar">
  <h1>後慈湖候補系統</h1>
  <div class="sub">管理後台 Admin Panel</div>
</header>

<main class="wrap">

<section class="card">
  <h2>現場新增候補</h2>

  <div class="form-grid">
    <input type="text" id="guestName" placeholder="姓名">
    <input type="number" id="guestCount" placeholder="人數" min="1" value="1">
    <input type="text" id="guestPhone" placeholder="手機末3碼">
  </div>

  <button class="btn primary" onclick="addGuest()">＋ 新增候補</button>
</section>

<section class="card stats">
  <div>
    <span class="small">目前叫號</span>
    <strong id="currentNo">A000</strong>
  </div>
  <div>
    <span class="small">等待組數</span>
    <strong id="waitingCount">0</strong>
  </div>
</section>

<section class="card actions">
  <h2>叫號控制</h2>

  <div class="btn-row">
    <button class="btn success" onclick="callNext()">▶ 下一號</button>
    <button class="btn warning" onclick="markMissed()">⏰ 過號</button>
    <button class="btn done" onclick="markDone()">✔ 已入園</button>
  </div>
</section>

<section class="card">
  <h2>等待名單</h2>
  <table class="table">
    <thead>
      <tr>
        <th>號碼</th>
        <th>姓名</th>
        <th>人數</th>
        <th>狀態</th>
      </tr>
    </thead>
    <tbody id="queueTable">
      <tr><td colspan="4">尚無資料</td></tr>
    </tbody>
  </table>
</section>

<section class="card">
  <h2>系統工具</h2>
  <div class="btn-row">
    <button class="btn danger" onclick="resetToday()">🗑 清空今日資料</button>
    <button class="btn" onclick="exportData()">⬇ 匯出名單</button>
  </div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
