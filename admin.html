.topbar{

justify-content:space-between;

.search{

.search input{

.grid4{

}

}

font-weight:900;

.green{color:var(--green);}
.orange{color:var(--orange);}
.blue{color:var(--blue);}
.red{color:var(--red);}
.gray{color:var(--gray);}

button.orange{

<script>
if(!localStorage.getItem("houcihu_admin_token")){

<div class="app">

<div class="sidebar">

<div class="brand">
後慈湖 後台系統
<small>v12 ULTRA PRO</small>
</div>

<div class="menu">
<a href="#">總覽儀表板</a>
<a href="#queue">候補名單</a>

</div>

<!-- KPI -->
<div class="grid4">

<div class="card">

</div>

<div class="card">

</div>

<div class="card">
已完成
<div class="kpi blue" id="kpiDone">0</div>
</div>

<div class="card">

</div>

</div>

<div class="card">

</div>

<div class="grid4">

<div class="card">

</div>

<div class="card">
熱門梯次

</div>

<div class="card">
等待壓力

</div>

<table>

<tr>

<th>開放</th>
<th>可遞補</th>

</tr>
</thead>

<tbody id="sessionBody">
<tr><td colspan="4">載入中...</td></tr>
</tbody>
</table>
</div>

</div>

<div class="footer">
Designed & Developed by Abby Luo ｜ Houcihu Official Build
</div>

</div>
</div>

<script src="sheets.js?v=12"></script>
<script src="script.js?v=12"></script>

<script>
function logout(){
localStorage.removeItem("houcihu_admin_token");
location.href="admin-login.html";
}

function exportCSV(){
const rows=[...document.querySelectorAll("#tbody tr")];
const csv=rows.map(r=>
[...r.children].slice(0,7).map(td=>td.innerText).join(",")
).join("\n");

const blob=new Blob([csv],{type:"text/csv"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="houcihu-report.csv";
a.click();
}

function voiceCall(){
const no=document.getElementById("currentNo").innerText;
const msg=new SpeechSynthesisUtterance(no+"號旅客請至櫃台");
msg.lang="zh-TW";
speechSynthesis.speak(msg);
}

document.getElementById("searchBox").addEventListener("input",function(){
const q=this.value.toLowerCase();

document.querySelectorAll("#tbody tr").forEach(r=>{
r.style.display=(r.innerText.toLowerCase().includes(q)||q==="")?"":"none";
});
});

function calcPressure(waiting){
if(waiting>=15) return "高";
if(waiting>=8) return "中";
return "低";
}

async function ultraSync(){

if(typeof cloudGet!=="function") return;

const rows=await cloudGet();

if(!rows || rows.length<=1) return;

let total=0,waiting=0,done=0,cancel=0,peopleSum=0;
let slotMap={};

for(let i=1;i<rows.length;i++){

total++;

const people=Number(rows[i][3]||1);
peopleSum+=people;

const slot=String(rows[i][4]||"-");
slotMap[slot]=(slotMap[slot]||0)+1;

const s=rows[i][5];

if(s==="waiting") waiting++;
if(s==="done") done++;
if(s==="cancel") cancel++;
}

document.getElementById("kpiTotal").innerText=total;
document.getElementById("kpiWaiting").innerText=waiting;
document.getElementById("kpiDone").innerText=done;
document.getElementById("kpiCancel").innerText=cancel;

document.getElementById("successRate").innerText=
total?Math.round(done/total*100)+"%":"0%";

let hot="-",max=0;
for(let k in slotMap){
if(slotMap[k]>max){max=slotMap[k];hot=k;}
}
document.getElementById("hotSlot").innerText=hot;

document.getElementById("pressure").innerText=
calcPressure(waiting);

document.getElementById("avgPeople").innerText=
total?(peopleSum/total).toFixed(1):"0";

}

ultraSync();
setInterval(ultraSync,5000);
</script>

</body>
