<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Houcihu 客人名單管理後台</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
  margin:0;
  background:#eef3ef;
  color:#1f2d1f;
}
header{
  background:linear-gradient(135deg,#1f5f35,#3e8b55);
  color:#fff;
  text-align:center;
  padding:22px;
}
.wrap{
  max-width:1300px;
  margin:auto;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}
.big{
  font-size:72px;
  font-weight:800;
  text-align:center;
  color:#1f7a3f;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#1f7a3f;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
button.gray{background:#888;}
button.red{background:#d43c3c;}
button.orange{background:#d98b00;}
input,select{
  width:100%;
  padding:10px;
  border:1px solid #d7dfd7;
  border-radius:10px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}
th{
  background:#f7faf7;
}
.grid2{
  display:grid;
  grid-template-columns:1fr 220px 220px;
  gap:12px;
}
.tag-wait{color:#1f7a3f;font-weight:700;}
.tag-call{color:#d98b00;font-weight:700;}
.tag-done{color:#3a6ea5;font-weight:700;}
.tag-cancel{color:#d43c3c;font-weight:700;}
</style>
</head>

<body>

<header>
<h1>Houcihu 客人名單管理後台</h1>
<div>客人名單｜叫號｜搜尋｜狀態管理</div>
</header>

<div class="wrap">

<!-- 目前叫號 -->
<div class="card">
<h2>目前叫號</h2>
<div class="big current">A000</div>
<button onclick="nextNo()">下一號</button>
</div>

<!-- 搜尋區 -->
<div class="card">
<h2>搜尋客人</h2>

<div class="grid2">
<input id="searchInput" placeholder="輸入姓名 / 電話 / 號碼">
<select id="filterSession">
<option value="">全部梯次</option>
<option value="1">第1梯</option>
<option value="3">第3梯</option>
<option value="5">第5梯</option>
<option value="7">第7梯</option>
</select>

<select id="filterStatus">
<option value="">全部狀態</option>
<option value="等待中">等待中</option>
<option value="已叫號">已叫號</option>
<option value="已到場">已到場</option>
<option value="取消">取消</option>
</select>
</div>

<br>
<button onclick="renderQueue()">搜尋 / 更新</button>
</div>

<!-- 客人名單 -->
<div class="card">
<h2>客人預約 / 候補名單</h2>

<table>
<thead>
<tr>
<th>號碼</th>
<th>姓名</th>
<th>電話</th>
<th>人數</th>
<th>梯次</th>
<th>狀態</th>
<th>操作</th>
</tr>
</thead>

<tbody id="queueBody"></tbody>

</table>
</div>

</div>

<script src="sheets.js"></script>
<script src="script.js"></script>

<script>
function renderQueue(){

let body = document.getElementById("queueBody");

if(!db || !db.queue){
  body.innerHTML = "";
  return;
}

let keyword =
document.getElementById("searchInput").value.trim();

let session =
document.getElementById("filterSession").value;

let status =
document.getElementById("filterStatus").value;

let rows = db.queue.filter(item=>{

let ok = true;

if(keyword){
ok =
item.no.includes(keyword) ||
(item.name||"").includes(keyword) ||
(item.phone||"").includes(keyword);
}

if(session){
ok = ok && item.session == session;
}

if(status){
ok = ok && item.status == status;
}

return ok;

}).map((item,index)=>`

<tr>
<td>${item.no}</td>
<td>${item.name||""}</td>
<td>${item.phone||""}</td>
<td>${item.count||1}</td>
<td>第${item.session}梯</td>
<td class="${getStatusClass(item.status)}">${item.status||"等待中"}</td>
<td>
<button onclick="setStatus(${index},'已叫號')">叫號</button>
<button class="gray" onclick="setStatus(${index},'已到場')">到場</button>
<button class="red" onclick="setStatus(${index},'取消')">取消</button>
</td>
</tr>

`).join("");

body.innerHTML = rows;
}

function getStatusClass(s){
if(s=="已叫號") return "tag-call";
if(s=="已到場") return "tag-done";
if(s=="取消") return "tag-cancel";
return "tag-wait";
}

async function setStatus(i,status){
db.queue[i].status = status;
await save();
renderQueue();
}

window.addEventListener("load",()=>{
setTimeout(renderQueue,800);
});
</script>

</body>
</html>
