<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Houcihu 候補管理後台</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
  margin:0;
  background:#eef3ef;
  color:#1f2d1f;
}
header{
  background:linear-gradient(135deg,#1f5f35,#3e8b55);
  color:#fff;
  text-align:center;
  padding:22px;
}
.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}
.big{
  font-size:72px;
  font-weight:800;
  text-align:center;
  color:#1f7a3f;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1f7a3f;
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:6px;
}
button.gray{background:#888;}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}
input,select{
  width:100%;
  padding:10px;
  border:1px solid #d7dfd7;
  border-radius:10px;
  font-size:15px;
}
.tag-open{
  color:#1f7a3f;
  font-weight:700;
}
.tag-close{
  color:#d43c3c;
  font-weight:700;
}
</style>
</head>

<body>

<header>
<h1>Houcihu 候補管理後台</h1>
<div>名額管理｜梯次開放｜現場叫號</div>
</header>

<div class="wrap">

<!-- 叫號區 -->
<div class="card">
<h2>目前叫號</h2>
<div class="big current">A000</div>
<button onclick="nextNo()">下一號</button>
</div>

<!-- 梯次管理 -->
<div class="card">
<h2>梯次名額管理</h2>

<table>
<thead>
<tr>
<th>梯次</th>
<th>時段</th>
<th>總名額</th>
<th>已報名</th>
<th>剩餘</th>
<th>開放狀態</th>
<th>操作</th>
</tr>
</thead>

<tbody>

<tr>
<td>第1梯</td>
<td>08:45</td>
<td><input id="cap1" value="50"></td>
<td id="used1">0</td>
<td id="left1">50</td>
<td id="status1" class="tag-open">開放</td>
<td>
<button onclick="saveCap(1)">儲存</button>
<button class="gray" onclick="toggleSession(1)">開 / 關</button>
</td>
</tr>

<tr>
<td>第3梯</td>
<td>09:45</td>
<td><input id="cap3" value="50"></td>
<td id="used3">0</td>
<td id="left3">50</td>
<td id="status3" class="tag-open">開放</td>
<td>
<button onclick="saveCap(3)">儲存</button>
<button class="gray" onclick="toggleSession(3)">開 / 關</button>
</td>
</tr>

<tr>
<td>第5梯</td>
<td>10:45</td>
<td><input id="cap5" value="50"></td>
<td id="used5">0</td>
<td id="left5">50</td>
<td id="status5" class="tag-open">開放</td>
<td>
<button onclick="saveCap(5)">儲存</button>
<button class="gray" onclick="toggleSession(5)">開 / 關</button>
</td>
</tr>

<tr>
<td>第7梯</td>
<td>12:45</td>
<td><input id="cap7" value="50"></td>
<td id="used7">0</td>
<td id="left7">50</td>
<td id="status7" class="tag-open">開放</td>
<td>
<button onclick="saveCap(7)">儲存</button>
<button class="gray" onclick="toggleSession(7)">開 / 關</button>
</td>
</tr>

</tbody>
</table>
</div>

<!-- 長者代填 -->
<div class="card">
<h2>長者手寫代填</h2>

<input id="staff_name" placeholder="姓名">
<input id="staff_phone" placeholder="電話">

<select id="staff_count">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
<option value="5">5 人</option>
</select>

<select id="staff_session">
<option value="1">第1梯</option>
<option value="3">第3梯</option>
<option value="5">第5梯</option>
<option value="7">第7梯</option>
</select>

<button onclick="addEntry()">加入候補</button>
</div>

</div>

<script src="sheets.js"></script>
<script src="script.js"></script>

</body>
</html>
